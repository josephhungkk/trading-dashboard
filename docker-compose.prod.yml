# docker-compose.prod.yml
# Run with: docker compose -f docker-compose.prod.yml up -d --build
#
# Nginx is DUAL-bound via two port mappings so cloudflared (loopback) AND the
# NUC (via WireGuard) can both reach it. UFW allows 80 on wg0 only; direct
# public access is impossible (no IONOS rule + UFW deny-all on eth0).

services:
  redis:
    image: redis:7-alpine@sha256:7aec734b2bb298a1d769fd8729f13b8514a41bf90fcdd1f38ec52267fbaa8ee6
    # Start as non-root to skip su-exec (blocked by cap_drop: ALL).
    user: "redis"
    # Disable persistence — session cache only; no /data writes under read_only.
    command: ["redis-server", "--requirepass", "${REDIS_PASSWORD}", "--save", "", "--appendonly", "no"]
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      retries: 5
      start_period: 5s
    mem_limit: 256m
    cpus: "0.5"
    security_opt: ["no-new-privileges:true"]
    cap_drop: ["ALL"]
    read_only: true
    tmpfs: ["/tmp:size=50m"]
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    networks: [td-net]

  backend:
    build: ./backend
    env_file: .env
    extra_hosts: ["host.docker.internal:host-gateway"]
    depends_on:
      redis: { condition: service_healthy }
    restart: unless-stopped
    # Prod: use the Dockerfile CMD (uvicorn WITHOUT --reload). No command: override here.
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://127.0.0.1:8000/health || exit 1"]
      interval: 15s
      retries: 5
      start_period: 30s
    mem_limit: 512m
    cpus: "1.0"
    security_opt: ["no-new-privileges:true"]
    cap_drop: ["ALL"]
    read_only: true
    tmpfs: ["/tmp:size=50m"]
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    networks: [td-net]

  frontend:
    # Prod frontend uses the nginx:alpine stage (static serve) — the Dockerfile's
    # default final target. Phase 0 compose overrode to target: build for dev.
    build:
      context: ./frontend
    # Start as nginx user (uid 101) to skip entrypoint's chown (blocked by cap_drop: ALL).
    user: "nginx"
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://127.0.0.1/ || exit 1"]
      interval: 15s
      retries: 5
      start_period: 10s
    mem_limit: 128m
    cpus: "0.5"
    security_opt: ["no-new-privileges:true"]
    cap_drop: ["ALL"]
    cap_add: ["NET_BIND_SERVICE"]
    read_only: true
    tmpfs:
      - "/var/cache/nginx:size=20m"
      - "/var/run:size=1m"
      - "/tmp:size=10m"
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    networks: [td-net]

  nginx:
    image: nginx:1.27-alpine@sha256:65645c7bb6a0661892a8b03b89d0743208a18dd2f3f17a54ef4b76fb8e2f2a10
    # Start as nginx user (uid 101) to skip entrypoint's chown (blocked by cap_drop: ALL).
    user: "nginx"
    restart: unless-stopped
    # DUAL-bound: loopback for cloudflared + wg0 for NUC dev bypass.
    ports:
      - "127.0.0.1:80:80"
      - "10.10.0.1:80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/conf.d:/etc/nginx/conf.d:ro
      - ./nginx/start.sh:/start.sh:ro
    entrypoint: ["/bin/sh", "/start.sh"]
    ulimits:
      nofile:
        soft: 8192
        hard: 16384
    depends_on:
      backend:  { condition: service_healthy }
      frontend: { condition: service_healthy }
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://127.0.0.1/health || exit 1"]
      interval: 15s
      retries: 5
      start_period: 20s
    mem_limit: 128m
    cpus: "0.5"
    security_opt: ["no-new-privileges:true"]
    cap_drop: ["ALL"]
    cap_add: ["NET_BIND_SERVICE"]
    read_only: true
    tmpfs:
      - "/var/log/nginx:size=20m"
      - "/var/cache/nginx:size=20m"
      - "/var/run:size=1m"
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    networks: [td-net]

networks:
  td-net:
    driver: bridge

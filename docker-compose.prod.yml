# docker-compose.prod.yml
# Run with: docker compose -f docker-compose.prod.yml up -d --build
#
# Nginx is DUAL-bound via two port mappings so cloudflared (loopback) AND the
# NUC (via WireGuard) can both reach it. UFW allows 80 on wg0 only; direct
# public access is impossible (no IONOS rule + UFW deny-all on eth0).

services:
  redis:
    image: redis:7-alpine@sha256:7aec734b2bb298a1d769fd8729f13b8514a41bf90fcdd1f38ec52267fbaa8ee6
    # Start as non-root to skip su-exec (blocked by cap_drop: ALL).
    user: "redis"
    # Disable persistence — session cache only; no /data writes under read_only.
    command: ["redis-server", "--requirepass", "${REDIS_PASSWORD}", "--save", "", "--appendonly", "no"]
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      retries: 5
      start_period: 5s
    mem_limit: 256m
    cpus: "0.5"
    security_opt: ["no-new-privileges:true"]
    cap_drop: ["ALL"]
    read_only: true
    tmpfs: ["/tmp:size=50m"]
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    networks: [td-net]

  bar_aggregator:
    build: ./bar_aggregator
    extra_hosts: ["host.docker.internal:host-gateway"]
    depends_on:
      redis: { condition: service_healthy }
    restart: unless-stopped
    environment:
      REDIS_URL: "redis://:${REDIS_PASSWORD}@redis:6379/0"
      DATABASE_URL: ${DATABASE_URL}
      FLUSH_INTERVAL_MS: "1000"
      AGGREGATOR_SHARD: "0"
      AGGREGATOR_SHARD_COUNT: "1"
    healthcheck:
      test: ["CMD", "python3", "-c", "import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://127.0.0.1:9100/healthz',timeout=2).getcode()==200 else 1)"]
      interval: 30s
      retries: 3
      start_period: 20s
    mem_limit: 256m
    cpus: "0.5"
    security_opt: ["no-new-privileges:true"]
    cap_drop: ["ALL"]
    read_only: true
    tmpfs: ["/tmp:size=50m"]
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    networks: [td-net]

  backend:
    build: ./backend
    env_file: .env
    extra_hosts: ["host.docker.internal:host-gateway"]
    depends_on:
      redis: { condition: service_healthy }
    restart: unless-stopped
    # Bypass `uv run` at runtime — dev-deps sync would OOM the /tmp tmpfs + needs
    # network + writes to a cache dir that's read-only under our hardening.
    # Absolute path: ``uvicorn`` is not on $PATH inside the python:3.14-slim
    # base image; the Dockerfile CMD uses /app/.venv/bin/uvicorn for the
    # same reason. Bare ``uvicorn`` here makes the entrypoint exec fail.
    command: /app/.venv/bin/uvicorn app.main:app --workers 1 --timeout-graceful-shutdown 30 --host 0.0.0.0 --port 8000
    healthcheck:
      # python:3.14-slim has no curl; use stdlib urllib.
      test: ["CMD", "python3", "-c", "import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://127.0.0.1:8000/health',timeout=2).getcode()==200 else 1)"]
      interval: 15s
      retries: 5
      start_period: 30s
    mem_limit: 512m
    cpus: "1.0"
    security_opt: ["no-new-privileges:true"]
    cap_drop: ["ALL"]
    read_only: true
    tmpfs: ["/tmp:size=50m"]
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    networks: [td-net]

  frontend:
    # Prod frontend uses the nginx:alpine stage (static serve) — the Dockerfile's
    # default final target. Phase 0 compose overrode to target: build for dev.
    build:
      context: ./frontend
    # Start as nginx user (uid 101) to skip entrypoint's chown (blocked by cap_drop: ALL).
    user: "nginx"
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://127.0.0.1/ || exit 1"]
      interval: 15s
      retries: 5
      start_period: 10s
    mem_limit: 128m
    cpus: "0.5"
    security_opt: ["no-new-privileges:true"]
    cap_drop: ["ALL"]
    cap_add: ["NET_BIND_SERVICE"]
    read_only: true
    # Mount the SPA-routing config over the stock default.conf so client-side
    # routes (/overview, /watchlist, etc.) fall back to /index.html instead of
    # 404. Without this, only `/` works and TanStack Router can't take over.
    volumes:
      - ./nginx/spa.conf:/etc/nginx/conf.d/default.conf:ro
    tmpfs:
      - "/var/cache/nginx:size=20m,mode=1777"
      - "/var/run:size=1m,mode=1777"
      - "/tmp:size=10m"
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    networks: [td-net]

  nginx:
    image: nginx:1.27-alpine@sha256:65645c7bb6a0661892a8b03b89d0743208a18dd2f3f17a54ef4b76fb8e2f2a10
    # Start as nginx user (uid 101) to skip entrypoint's chown (blocked by cap_drop: ALL).
    user: "nginx"
    restart: unless-stopped
    # DUAL-bound: loopback for cloudflared + wg0 for NUC dev bypass.
    ports:
      - "127.0.0.1:80:80"
      - "10.10.0.1:80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/conf.d:/etc/nginx/conf.d:ro
      - ./nginx/start.sh:/start.sh:ro
    entrypoint: ["/bin/sh", "/start.sh"]
    ulimits:
      nofile:
        soft: 8192
        hard: 16384
    depends_on:
      backend:  { condition: service_healthy }
      frontend: { condition: service_healthy }
    healthcheck:
      # Must send correct Host — nginx returns 444 (close-without-response) for other hosts.
      test: ["CMD-SHELL", "wget -q -O- --header='Host: dashboard.kiusinghung.com' http://127.0.0.1/health | grep -q status.:.ok || exit 1"]
      interval: 15s
      retries: 5
      start_period: 20s
    mem_limit: 128m
    cpus: "0.5"
    security_opt: ["no-new-privileges:true"]
    cap_drop: ["ALL"]
    cap_add: ["NET_BIND_SERVICE"]
    read_only: true
    tmpfs:
      - "/var/log/nginx:size=20m,mode=1777"
      - "/var/cache/nginx:size=20m,mode=1777"
      - "/var/run:size=1m,mode=1777"
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    networks: [td-net]

  schwab-sidecar:
    build: ./sidecar_schwab
    restart: unless-stopped
    environment:
      SCHWAB_SIDECAR_PORT: "9090"
      BACKEND_ADMIN_GRPC: "backend:8001"
      LOG_LEVEL: "INFO"
    networks: [td-net]
    depends_on:
      backend: { condition: service_started }

  schwab-refresher:
    build: ./sidecar_schwab_refresher
    restart: unless-stopped
    environment:
      BACKEND_ADMIN_URL: "https://dashboard.kiusinghung.com"
      REFRESH_INTERVAL_HOURS: "72"
      DRY_RUN: "false"
      CF_ACCESS_CLIENT_ID: "${CF_ACCESS_CLIENT_ID}"
      CF_ACCESS_CLIENT_SECRET: "${CF_ACCESS_CLIENT_SECRET}"
    networks: [td-net]
    profiles: ["tier2"]

  alpaca-sidecar-live:
    build: ./sidecar_alpaca
    restart: unless-stopped
    environment:
      MODE: "live"
      GRPC_PORT: "9091"
      BACKEND_ADMIN_GRPC: "backend:8001"
      ALPACA_ACCOUNT_LABEL: "default"
      LOG_LEVEL: "INFO"
    networks: [td-net]
    depends_on:
      backend: { condition: service_started }

  alpaca-sidecar-paper:
    build: ./sidecar_alpaca
    restart: unless-stopped
    environment:
      MODE: "paper"
      GRPC_PORT: "9092"
      BACKEND_ADMIN_GRPC: "backend:8001"
      ALPACA_ACCOUNT_LABEL: "default"
      LOG_LEVEL: "INFO"
    networks: [td-net]
    depends_on:
      backend: { condition: service_started }

networks:
  td-net:
    driver: bridge

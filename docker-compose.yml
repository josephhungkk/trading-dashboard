# Postgres intentionally absent — runs natively on Windows on the NUC15PRO.
# Dev (Claude/uvicorn on the NUC):         host.docker.internal:5432  (NUC's own PG18)
# Prod (uvicorn on IONOS VPS, Phase 1+):   10.10.0.2:5432             (same NUC, via WireGuard)
# See DATABASE_URL in .env.

services:
  redis:
    image: redis:7-alpine
    command: ["redis-server", "--requirepass", "${REDIS_PASSWORD}"]
    ports: ["6379:6379"]
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 5s
      retries: 10

  bar_aggregator:
    build: ./bar_aggregator
    extra_hosts: ["host.docker.internal:host-gateway"]
    depends_on:
      redis: { condition: service_healthy }
    environment:
      REDIS_URL: "redis://:${REDIS_PASSWORD}@redis:6379/0"
      DATABASE_URL: ${DATABASE_URL}
      FLUSH_INTERVAL_MS: "1000"
      AGGREGATOR_SHARD: "0"
      AGGREGATOR_SHARD_COUNT: "1"
    restart: unless-stopped

  # Phase 11a CI-debt: dedicated TimescaleDB instance for the test suite.
  # The prod PG at 10.10.0.2 holds operator data (broker accounts, positions,
  # encrypted secrets) and must not be touched by test setup/teardown.
  # Tests override DATABASE_URL via scripts/run-tests.sh or pytest env var.
  # Image tracks prod: PG18 + TimescaleDB latest-pg18 (mirrors NUC native PG18).
  test_postgres:
    image: timescale/timescaledb:latest-pg18
    environment:
      POSTGRES_USER: test
      POSTGRES_PASSWORD: test
      POSTGRES_DB: test
    ports: ["5433:5432"]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U test -d test"]
      interval: 3s
      retries: 20
    profiles: ["test"]
    restart: "no"

  backend:
    build:
      context: ./backend
      # dev stage includes the [dependency-groups.dev] block (alpaca-py,
      # schwabdev, pytest, fakeredis, ruff). Prod compose falls through to
      # the default `prod` stage which excludes them to keep the image slim.
      target: dev
    env_file: .env
    extra_hosts: ["host.docker.internal:host-gateway"]
    depends_on:
      redis: { condition: service_healthy }
    ports: ["8000:8000"]
    volumes:
      - ./backend/app:/app/app
      - ./backend/tests:/app/tests
      # Phase 11a CI-debt: mount alembic so new migrations don't require a
      # full image rebuild. The image's /app/alembic snapshot can drift
      # (e.g. 0042_phase11a_ai_jobs landed after the last build).
      - ./backend/alembic:/app/alembic
      # Phase 11a CI-debt: mount sidecar_schwab so unit tests that import
      # sidecar_schwab._generated.broker.v1.broker_pb2 (proto stubs) resolve.
      # Backend image otherwise has no knowledge of the schwab sidecar pkg.
      - ./sidecar_schwab:/app/sidecar_schwab
      # Phase 11a CI-debt: mount deploy/prometheus so test_metrics_orders
      # tests find alerts.yml at /deploy/prometheus/alerts.yml.
      - ./deploy/prometheus:/deploy/prometheus
    command: ["uv", "run", "uvicorn", "app.main:app", "--host", "0.0.0.0", "--port", "8000", "--reload"]

  frontend:
    build:
      context: ./frontend
      target: build
    command: ["pnpm", "dev", "--host", "0.0.0.0"]
    ports: ["5173:5173"]
    volumes:
      - "./frontend/src:/app/src"
      - "./frontend/public:/app/public"
    environment:
      VITE_API_URL: "http://localhost:8000"

  # Phase 11a-A1 + A.5: AI router proxy. Lightweight image; cost ledger
  # is ours (not litellm-database). Master-key validation is Redis-backed
  # via the custom_auth callback mounted from backend/app/services/ai/
  # (HIGH-5 — zero-restart rotation).
  #
  # LiteLLM's get_instance_fn resolves custom_auth relative to the
  # config.yaml directory (dirname(/app/config.yaml) = /app), so the
  # callback must live at /app/services/ai/litellm_auth_callback.py —
  # PYTHONPATH alone is NOT consulted when --config is passed. Hence
  # the bind mounts target /app/services/ai/ directly.
  litellm:
    image: ghcr.io/berriai/litellm:main-stable
    container_name: dashboard-litellm-dev
    restart: unless-stopped
    ports:
      - "127.0.0.1:4000:4000"
    volumes:
      - ./deploy/litellm/config.yaml:/app/config.yaml:ro
      - ./backend/app/services/ai/litellm_auth_callback.py:/app/services/ai/litellm_auth_callback.py:ro
      - ./deploy/litellm/__init__.py:/app/services/__init__.py:ro
      - ./deploy/litellm/__init__.py:/app/services/ai/__init__.py:ro
    environment:
      REDIS_URL: "redis://:${REDIS_PASSWORD}@redis:6379/0"
      LITELLM_LOG: WARNING
    healthcheck:
      test: ["CMD", "litellm", "--health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
    depends_on:
      redis:
        condition: service_healthy
    command: ["--config", "/app/config.yaml", "--port", "4000", "--num_workers", "1"]

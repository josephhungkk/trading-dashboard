groups:
  - name: phase5b_orders
    rules:
      - alert: BrokerOrderEventsHighDropRate
        expr: |
          rate(broker_order_events_dropped_total[5m]) >
          0.5 * rate(broker_order_events_received_total[5m])
        for: 5m
        labels: { severity: page }
        annotations:
          summary: "Order event consumer poisoning"
          description: "Drop rate >50% sustained for 5m on {{ $labels.label }}"
      - alert: PendingSubmitOrphan
        expr: increase(broker_order_pending_submit_orphan_total[15m]) > 0
        for: 1m
        labels: { severity: page }
        annotations:
          summary: "Pending-submit order orphaned (no broker match after 5min)"

      - alert: BrokerOrderEventStreamDown
        expr: consumer_alive == 0
        for: 2m
        labels: { severity: page }
        annotations:
          summary: "OrderEvent stream down for {{ $labels.label }}/{{ $labels.account_id }}"
          description: "Per-account broker order stream task is not alive; supervisor should respawn within 60s. >2m down means the supervisor is stuck or the (label, account) pair was removed. Check broker_order_event_supervisor_iteration_skipped_overlap and broker_order_event_supervisor_error logs."

      - alert: BrokerOrderEventStreamFlapping
        expr: increase(broker_order_stream_reconnects_total[10m]) > 10
        for: 5m
        labels: { severity: warning }
        annotations:
          summary: "OrderEvent stream flapping for {{ $labels.label }} (>10 reconnects/10m)"
          description: "Reconnect counter climbed by {{ $value }} in 10m sustained for 5m; sidecar gRPC channel or IBKR connection is unstable. Check sidecar logs for orderevent_subscribed/orderevent_unsubscribed lifecycle and broker_sidecar_stream_closed entries."

      - alert: BrokerLabelMismatch
        expr: increase(broker_registry_label_mismatch_total[5m]) > 0
        for: 1m
        labels: { severity: page }
        annotations:
          summary: "Broker label mismatch on {{ $labels.label }}"
          description: "Sidecar at label {{ $labels.label }} reports a different broker_id than SIDECAR_BROKERS map. Operator misconfiguration; check deploy logs and broker_registry_factory.py."

      - alert: BrokerFutuNormalizeUnknown
        expr: increase(broker_normalize_unknown_total{label="futu"}[15m]) > 5
        for: 5m
        labels: { severity: warning }
        annotations:
          summary: "Futu sidecar saw >5 unknown enum values in 15m on {{ $labels.field }}"
          description: "futu-api emitted enum values normalize.py doesn't know about. Likely a futu-api SDK upgrade introduced a new SecurityType / OrderStatus / TrdEnv. Check sidecar logs for the raw value."

  - name: phase5b1_canary_hotfix
    rules:
      - alert: BrokerDiscoverPositionsP99HighWarning
        expr: histogram_quantile(0.99, rate(broker_discover_positions_update_duration_ms_bucket[5m])) > 1000
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "BrokerDiscoverer positions fan-out p99 > 1000ms"
          description: "p99 of broker_discover_positions_update_duration_ms over 5m is {{ $value }}ms (threshold 1000ms). Expected ~150ms at 22 accounts."

      - alert: BrokerSimCancelEchoMismatch
        expr: |
          abs(
            rate(broker_sim_cancel_echo_total[5m])
            - rate(http_requests_total{handler="DELETE /api/orders/{id}",code="202"}[5m])
          ) > 0.1
        for: 10m
        labels:
          severity: warning
        annotations:
          summary: "SIM cancel echo rate diverges from cancel HTTP rate"
          description: "broker_sim_cancel_echo_total rate {{ $value }} differs from cancel HTTP 202 rate by >10% - synthetic emit may be dropping events or extra echoes are firing."

  - name: phase5c_advanced_orders
    rules:
      - alert: BrokerBracketCascadeLag
        expr: |
          histogram_quantile(0.99,
            rate(broker_bracket_cancel_cascade_seconds_bucket[5m])
          ) > 5
        for: 10m
        labels:
          severity: warning
        annotations:
          summary: "Bracket cancel cascade > 5s p99"
          description: "After parent cancel, OCA-attached children took > 5s to reach cancelled status (p99 over 5m)."

      - alert: BrokerPendingFillsBacklog
        expr: pending_fills_backlog_count > 0
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "pending_fills has rows older than 5 min"
          description: "pending_fills_backlog_count is {{ $value }} over 5m. Manual reconciliation may be needed - sweeper drains every 30s but couldn't resolve the broker_order_id+account_id to an orders row."

      - alert: CommissionBufferOverflow
        expr: increase(commission_buffer_overflow_total[15m]) > 0
        for: 1m
        labels:
          severity: page
        annotations:
          summary: "Commission buffer exceeded 1000 entries"
          description: "In-memory _COMMISSION_BUFFER overflow - many commissionReport events arrived without matching fill rows. Indicates fills INSERT pipeline is stalled or exec_id mismatch upstream."

      - alert: BrokerOrderModifyP99HighWarning
        expr: histogram_quantile(0.99, rate(broker_order_modify_duration_ms_bucket[5m])) > 1500
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "Order modify p99 > 1500ms"
          description: "Modify path latency degraded; check broker channel + state-machine validation."

      - alert: BrokerFillsWriteFailures
        expr: increase(broker_fills_write_failed_total[15m]) > 0
        for: 1m
        labels:
          severity: page
        annotations:
          summary: "Fills write failures detected"
          description: "Consumer failed to insert fill rows ({{ $labels.reason }}). Check backend logs."

  - name: phase7a_schwab
    rules:
      - alert: SchwabAccessTokenStale
        expr: schwab_access_token_age_seconds > 1500
        for: 2m
        labels:
          severity: warning
        annotations:
          summary: "Schwab access_token older than 25 min (freshness window breached)"
          description: "Access token age {{ $value }}s exceeds the 25-min refresh threshold (H4). Tier-2 refresher should mint a new token; if Tier-2 disabled, operator must run Tier-1 manual flow before token expires at 30 min."

      - alert: SchwabRefreshTokenExpiringSoon
        expr: schwab_refresh_token_age_hours > 144
        for: 10m
        labels:
          severity: page
        annotations:
          summary: "Schwab refresh_token > 144h (24h until 168h hard expiry)"
          description: "Refresh token age {{ $value }}h. Schwab forces re-auth at 168h. Operator must run the Tier-1 manual OAuth flow within 24h to mint a new refresh_token."

      - alert: SchwabRefreshTokenFlapping
        expr: schwab_refresh_token_uses_per_24h > 50
        for: 15m
        labels:
          severity: warning
        annotations:
          summary: "Schwab refresh_token used > 50 times in 24h (restart-flap detector — H4)"
          description: "Refresh-token-use rate is {{ $value }}/24h. Expected ~48 (every 25 min). Higher rate indicates sidecar restart loop or duplicate writers — check schwab-sidecar logs and PG advisory-lock contention."

      - alert: SchwabSidecarTokenDriftHigh
        expr: schwab_sidecar_token_drift_seconds > 60
        for: 5m
        labels:
          severity: page
        annotations:
          summary: "Sidecar Configure RPC drift > 60s after a known token write (C3 invariant)"
          description: "Backend wrote a new token but sidecar never received Configure within 60s. Pub/sub forwarder may be down or sidecar is unreachable. Check SSE config_stream and broker_configure_total{reason='success'}."

      - alert: SchwabOAuthCallbackFailures
        expr: |
          rate(schwab_oauth_callback_total{result!="success"}[5m]) >
          0.5 * rate(schwab_oauth_callback_total[5m])
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "Schwab OAuth callback failure rate > 50%"
          description: "Most OAuth callbacks are failing on path={{ $labels.path }}. Likely state-nonce HMAC verification, replay defense (Redis GETDEL), or app_secrets missing. Check backend logs around oauth.py."

      - alert: SchwabHttpErrorRateHigh
        expr: |
          rate(schwab_http_requests_total{status=~"5..|429"}[5m]) >
          0.1 * rate(schwab_http_requests_total[5m])
        for: 10m
        labels:
          severity: warning
        annotations:
          summary: "Schwab REST 5xx/429 rate > 10% on {{ $labels.endpoint }}"
          description: "Sustained Schwab API errors. 429 = rate limit (sidecar should back off). 5xx = upstream incident. Check sidecar logs + Schwab status page."

      - alert: SchwabTier2Stalled
        # 72h schedule + 1h tolerance = 72*3600 + 3600 = 262800s
        expr: time() - schwab_tier2_last_run_timestamp_seconds > 262800
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "Tier-2 Schwab refresher hasn't run in > 73 h"
          description: "Last Tier-2 attempt {{ $value }}s ago. Refresher cron fires every 72h (3 days). Check schwab-refresher container + selector-health probe (auto-disabled after 3 consecutive failures — H2)."

      - alert: SchwabOAuthNoStateCallbackUnexpected
        expr: rate(schwab_oauth_no_state_total[1h]) > 0.001
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "Schwab OAuth callback received without state parameter"
          description: "schwab_oauth_no_state_total is incrementing — a callback arrived without HMAC-signed state. CSRF defense falls back to redirect_uri match only. Investigate source IP; per-IP rate limit (1/5min) is active."

      - alert: SchwabTier2FailureRateHigh
        expr: |
          rate(schwab_tier2_refresh_total{result!="success"}[15m]) >
          0.5 * rate(schwab_tier2_refresh_total[15m])
        for: 10m
        labels:
          severity: warning
        annotations:
          summary: "Tier-2 Schwab refresher failure rate > 50%"
          description: "Most Tier-2 refresh attempts failing (result={{ $labels.result }}). Schwab login UI selectors may have drifted (H2). Refresher will auto-disable after 3 consecutive failures — operator must fall back to Tier-1 manual."

      - alert: SchwabAccountHashRefreshChurn
        expr: increase(schwab_account_hash_refresh_total[1h]) > 10
        for: 15m
        labels:
          severity: warning
        annotations:
          summary: "Schwab account_hash cache refreshing > 10×/h"
          description: "account_hash cache refresh churn (reason={{ $labels.reason }}). Expected ~1/h (lifespan + post-write). Higher rate means cache is being invalidated unexpectedly — check broker_callback_server logs."

  - name: phase8a_schwab_trade
    interval: 30s
    rules:
      - alert: SchwabOrderPollerStalled
        expr: |
          sum by (gateway_label, account_id) (
            rate(schwab_order_poller_iterations_total{cadence="2s"}[2m])
          ) == 0
          and on(gateway_label, account_id)
          sum by (gateway_label, account_id) (
            last_over_time(schwab_order_poller_iterations_total{cadence="2s"}[10m])
          ) > 0
        for: 90s
        labels:
          severity: page
        annotations:
          summary: "Schwab order poller stalled in fast cadence ({{ $labels.account_id }})"
          runbook: "deploy/runbook-schwab-trade.md#schwaborderpollerstalled"

      - alert: SchwabPlaceOrderErrorRateHigh
        # SCHWAB_HTTP_REQUESTS_TOTAL has labels (endpoint, status).
        # place_order calls _call_raw with endpoint="/accounts.orders.place" (confirmed from client.py).
        expr: |
          (sum(rate(schwab_http_requests_total{endpoint="/accounts.orders.place",status!~"2.."}[5m]))
           / sum(rate(schwab_http_requests_total{endpoint="/accounts.orders.place"}[5m]))) > 0.1
        for: 5m
        labels: { severity: warning }
        annotations:
          summary: "Schwab /accounts.orders.place >10% non-2xx over 5min"
          runbook: "deploy/runbook-schwab-trade.md#schwabplaceordererror"

      - alert: SchwabOrderEventGapNoActivity
        expr: |
          sum(rate(schwab_order_poller_iterations_total{cadence="2s"}[5m])) > 0
          and sum(rate(schwab_order_event_emitted_total[5m])) == 0
        for: 5m
        labels: { severity: warning }
        annotations:
          summary: "Schwab poller in fast cadence but no events emitted in 5min"
          runbook: "deploy/runbook-schwab-trade.md#schwabordereventgap"

      - alert: OrderCapabilityCacheChurn
        expr: rate(order_capability_pubsub_invalidations_total[1h]) > 100
        for: 15m
        labels: { severity: warning }
        annotations:
          summary: "Capability cache invalidated >100x in last hour"
          runbook: "deploy/runbook-schwab-trade.md#capabilitycachechurn"

      - alert: OrderCapabilityCheckUnknownBroker
        expr: increase(order_capability_check_total{result="unknown_broker"}[5m]) > 0
        for: 1m
        labels: { severity: page }
        annotations:
          summary: "Capability check hit unknown_broker — registry/table drift"
          runbook: "deploy/runbook-schwab-trade.md#unknownbroker"

      - alert: OrderCapabilityPubsubFailures
        expr: increase(order_capability_pubsub_failures_total[5m]) > 0
        for: 5m
        labels: { severity: warning }
        annotations:
          summary: "Redis pubsub failed to publish capability invalidation"
          runbook: "deploy/runbook-schwab-trade.md#capabilitypubsubfailures"

  - name: phase8_capability
    rules:
      # G1: capability mismatch — fires when the capability table has a row for
      # a (broker, asset_class, order_type, tif) combo with is_supported=False
      # yet orders for that combo keep being submitted (sustained increments).
      # NOTE: broker_capability_mismatch_total is declared in
      #   backend/app/core/metrics.py (Phase 9.7 G1) but the application-side
      #   increment is not yet wired.  See TODO in metrics.py pointing to
      #   order_capability_service.py is_supported() — needs an `elif row is
      #   not None:` branch to increment this counter before returning False.
      #   This alert will NOT fire until that increment lands.
      - alert: BrokerCapabilityMismatchSustained
        expr: |
          increase(broker_capability_mismatch_total[5m]) > 0
        for: 5m
        labels: { severity: warning }
        annotations:
          summary: "Broker {{ $labels.broker }} capability mismatch sustained >5m"
          description: >
            broker_capability_mismatch_total for {{ $labels.broker }} has been
            incrementing for >5m. A (asset_class, order_type, tif) combo exists
            in broker_order_capability with is_supported=False yet orders keep
            being submitted. Reconcile the capability table via
            POST /api/admin/capabilities or update order_capability_service.py.

      # G1: poller drift — fires when the order-poller heartbeat has not been
      # observed for >60 s (gauge stays elevated).
      # NOTE: broker_poller_drift_seconds is declared in
      #   backend/app/core/metrics.py (Phase 9.7 G1) but the application-side
      #   set() call is not yet wired.  See TODO in metrics.py pointing to
      #   BrokerDiscoverer / HealthPoller in brokers.py.  Until then the Gauge
      #   stays at 0 and this alert will NOT fire.
      - alert: BrokerPollerDriftHigh
        expr: broker_poller_drift_seconds > 60
        for: 2m
        labels: { severity: warning }
        annotations:
          summary: >
            Order poller drift >60s for {{ $labels.gateway_label }}/{{ $labels.account_id }}
          description: >
            broker_poller_drift_seconds > 60 s sustained for 2 m on
            gateway_label={{ $labels.gateway_label }}
            account_id={{ $labels.account_id }}.
            The order poller may have stalled or the heartbeat feed is not
            updating. Cross-check schwab_order_poller_iterations_total cadence
            and the SchwabOrderPollerStalled alert; inspect sidecar logs for
            orderevent_poller_tick_failed entries.

      # G2: combined place+cancel+modify error rate >5% over 5 m.
      # NOTE: broker_order_place_total / broker_order_cancel_total /
      #   broker_order_modify_total are declared in backend/app/core/metrics.py
      #   (Phase 9.7 G2) but the application-side increments are not yet wired.
      #   See TODO comments in metrics.py pointing to orders_service.py and
      #   api/orders.py for the exact call sites.  Until those increments land
      #   the denominator will be 0, the division evaluates to NaN, and this
      #   alert will NOT fire.  For Schwab-specific interim coverage see
      #   SchwabPlaceOrderErrorRateHigh (phase8a_schwab_trade group), which uses
      #   schwab_http_requests_total{endpoint="/accounts.orders.place"}.
      - alert: BrokerPlaceModifyCancelErrors
        expr: |
          (
            sum(rate(broker_order_place_total{result!="success"}[5m]))
            + sum(rate(broker_order_cancel_total{result!="success"}[5m]))
            + sum(rate(broker_order_modify_total{result!="success"}[5m]))
          )
          /
          (
            sum(rate(broker_order_place_total[5m]))
            + sum(rate(broker_order_cancel_total[5m]))
            + sum(rate(broker_order_modify_total[5m]))
          )
          > 0.05
        for: 5m
        labels: { severity: warning }
        annotations:
          summary: "Broker order operation error rate >5% over 5m"
          description: >
            Combined place+cancel+modify error rate (result!="success") exceeds
            5% sustained for 5m. Check broker sidecar logs for RPC errors and
            review broker_order_place_total, broker_order_cancel_total, and
            broker_order_modify_total label breakdown for the affected label.
            Cross-check SchwabPlaceOrderErrorRateHigh for Schwab-specific signal.

name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  proto:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: bufbuild/buf-setup-action@v1
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
      - name: buf lint
        working-directory: proto
        run: buf lint
      - name: buf format check
        working-directory: proto
        run: buf format --diff --exit-code

  sidecar:
    runs-on: ubuntu-latest
    needs: proto
    steps:
      - uses: actions/checkout@v4
      - uses: bufbuild/buf-setup-action@v1
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
      - uses: astral-sh/setup-uv@v5
        with:
          python-version: '3.14'
      - name: Install sidecar deps
        working-directory: sidecar
        run: uv sync --extra dev --frozen
      - name: Generate proto stubs (grpc_tools)
        working-directory: sidecar
        run: |
          mkdir -p _generated/broker/v1
          : > _generated/__init__.py
          : > _generated/broker/__init__.py
          : > _generated/broker/v1/__init__.py
          uv run python -m grpc_tools.protoc \
            --proto_path=../proto \
            --python_out=_generated \
            --grpc_python_out=_generated \
            --pyi_out=_generated \
            broker/v1/broker.proto
          sed -i 's|^from broker\.v1 import broker_pb2|from sidecar._generated.broker.v1 import broker_pb2|' \
            _generated/broker/v1/broker_pb2_grpc.py
      - name: Pytest (skip real_ibkr)
        working-directory: sidecar
        env:
          REAL_IBKR: ''
        run: uv run pytest --cov=sidecar --cov-fail-under=80 -m 'not real_ibkr'

  backend:
    runs-on: ubuntu-latest
    needs: proto
    services:
      postgres:
        image: postgres:18-alpine
        env:
          POSTGRES_USER: trader
          POSTGRES_PASSWORD: ci
          POSTGRES_DB: dashboard
        ports: ['5432:5432']
        options: >-
          --health-cmd "pg_isready -U trader"
          --health-interval 5s
          --health-retries 10
      redis:
        image: redis:7-alpine
        ports: ['6379:6379']
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-retries 10
    steps:
      - uses: actions/checkout@v4
      - uses: bufbuild/buf-setup-action@v1
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
      - uses: astral-sh/setup-uv@v5
        with:
          python-version: '3.14'
      - name: Install backend deps
        working-directory: backend
        run: uv sync --frozen
      - name: Generate proto stubs (grpc_tools)
        working-directory: backend
        run: |
          mkdir -p app/_generated/broker/v1
          : > app/_generated/__init__.py
          : > app/_generated/broker/__init__.py
          : > app/_generated/broker/v1/__init__.py
          uv run python -m grpc_tools.protoc \
            --proto_path=../proto \
            --python_out=app/_generated \
            --grpc_python_out=app/_generated \
            --pyi_out=app/_generated \
            broker/v1/broker.proto
          sed -i 's|^from broker\.v1 import broker_pb2|from app._generated.broker.v1 import broker_pb2|' \
            app/_generated/broker/v1/broker_pb2_grpc.py
      - name: pip-audit
        working-directory: backend
        # CVE-2026-3219 is in pip itself (the package installer), not runtime
        # code. uv handles installs; pip never runs in our request path. Track
        # for upstream patch via uv release notes.
        run: uv run pip-audit --strict --ignore-vuln CVE-2026-3219
      - name: Ruff check
        working-directory: backend
        run: uv run ruff check .
      - name: Ruff format check
        working-directory: backend
        run: uv run ruff format --check .
      - name: Mypy
        working-directory: backend
        run: uv run mypy app/
      - name: Pytest
        working-directory: backend
        env:
          DATABASE_URL: postgresql+asyncpg://trader:ci@localhost:5432/dashboard
          APP_SECRET_KEY: ci-secret-key-32-chars-minimum-req
          APP_ENV: dev
          APP_CORS_ORIGINS: '["http://localhost:5173"]'
          POSTGRES_POOL_SIZE: '2'
          POSTGRES_MAX_OVERFLOW: '2'
          REDIS_PASSWORD: ci
          REDIS_URL: redis://localhost:6379/0
          CI_USE_REAL_REDIS: '1'
          CI_REDIS_URL: redis://localhost:6379/0
        run: uv run pytest --cov=app --cov-report=term-missing
      - name: Docker build (main only)
        if: github.ref == 'refs/heads/main'
        working-directory: backend
        run: docker build -t trading-dashboard-backend:ci .

  frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: latest
      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'pnpm'
          cache-dependency-path: frontend/pnpm-lock.yaml
      - name: Install frontend deps
        working-directory: frontend
        run: pnpm install --frozen-lockfile
      - name: pnpm audit
        working-directory: frontend
        run: pnpm audit --audit-level=high
      - name: Lint
        working-directory: frontend
        run: pnpm lint
      - name: Stylelint
        working-directory: frontend
        run: pnpm stylelint
      - name: Typecheck
        working-directory: frontend
        run: pnpm typecheck
      - name: Tests
        working-directory: frontend
        run: pnpm test
      - name: Build
        working-directory: frontend
        run: pnpm build
      - name: Storybook build
        working-directory: frontend
        run: pnpm build-storybook
      - name: Docker build (main only)
        if: github.ref == 'refs/heads/main'
        working-directory: frontend
        run: docker build -t trading-dashboard-frontend:ci .

  frontend-types-up-to-date:
    needs: [proto, backend]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
        with:
          python-version: '3.14'
      - uses: pnpm/action-setup@v4
        with:
          version: latest
      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'pnpm'
          cache-dependency-path: frontend/pnpm-lock.yaml
      - name: Check generated frontend API types
        working-directory: frontend
        run: pnpm install --frozen-lockfile && pnpm check:types-up-to-date

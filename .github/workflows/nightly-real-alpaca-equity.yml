name: nightly-real-alpaca-equity

on:
  schedule:
    - cron: "30 22 * * 1-5"  # post-NYSE close
  workflow_dispatch:

jobs:
  nightly-alpaca-equity-e2e:
    runs-on: ubuntu-latest
    if: github.repository == 'josephhungkk/trading-dashboard'
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix:
        case: [market_spy, limit_spy, trail_spy]
    env:
      ALPACA_PAPER_API_KEY: ${{ secrets.ALPACA_PAPER_API_KEY }}
      ALPACA_PAPER_API_SECRET: ${{ secrets.ALPACA_PAPER_API_SECRET }}
      DATABASE_URL: postgresql+asyncpg://trader:ci@localhost:5432/dashboard
      APP_SECRET_KEY: ci-secret-key-32-chars-minimum-req
      APP_ENV: dev
      APP_CORS_ORIGINS: '["http://localhost:5173"]'
      POSTGRES_POOL_SIZE: '2'
      POSTGRES_MAX_OVERFLOW: '2'
      REDIS_PASSWORD: ci
      REDIS_URL: redis://localhost:6379/0
    services:
      postgres:
        image: timescale/timescaledb:2.26.4-pg18
        env:
          POSTGRES_USER: trader
          POSTGRES_PASSWORD: ci
          POSTGRES_DB: dashboard
        ports: ['5432:5432']
        options: >-
          --health-cmd "pg_isready -U trader"
          --health-interval 5s
          --health-retries 10
      redis:
        image: redis:7-alpine
        ports: ['6379:6379']
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-retries 10
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4.3.1
      - uses: astral-sh/setup-uv@d4b2f3b6ecc6e67c4457f6d3e41ec42d3d0fcb86  # v5.4.2
        with:
          python-version: "3.14"
      - name: Install backend deps (parent project — proto-stub gen needs it)
        working-directory: backend
        run: uv sync --frozen
      - name: Generate proto stubs
        working-directory: backend
        run: uv run python scripts/generate_proto_stubs.py
      # Phase 10a.5.1 C4: real_broker is now a standalone uv project at
      # backend/tests/real_broker/. Sync there for alpaca-py + schwabdev.
      - name: Install real-broker test deps
        working-directory: backend/tests/real_broker
        run: uv sync --frozen
      - name: Run real Alpaca paper equity E2E
        working-directory: backend/tests/real_broker
        run: uv run pytest test_real_alpaca_equity_e2e.py -m real_alpaca_equity --case ${{ matrix.case }} -v
      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02  # v4.6.2
        with:
          name: nightly-alpaca-equity-results-${{ github.run_id }}-${{ matrix.case }}
          path: backend/test-results/
          retention-days: 30

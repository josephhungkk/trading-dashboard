name: weekly-real-schwab-drift

on:
  schedule:
    - cron: "0 7 * * 0"  # 07:00 UTC Sunday
  workflow_dispatch:

jobs:
  capability-drift-check:
    runs-on: ubuntu-latest
    if: github.repository == 'josephhungkk/trading-dashboard'
    timeout-minutes: 20
    env:
      SCHWAB_APP_KEY: ${{ secrets.SCHWAB_APP_KEY }}
      SCHWAB_APP_SECRET: ${{ secrets.SCHWAB_APP_SECRET }}
      SCHWAB_PAPER_ACCOUNT_HASH: ${{ secrets.SCHWAB_PAPER_ACCOUNT_HASH }}
      SCHWAB_PAPER_SYMBOL: ${{ secrets.SCHWAB_PAPER_SYMBOL || 'F' }}
      DATABASE_URL: postgresql+asyncpg://trader:ci@localhost:5432/dashboard
      APP_SECRET_KEY: ci-secret-key-32-chars-minimum-req
      APP_ENV: dev
      APP_CORS_ORIGINS: '["http://localhost:5173"]'
      POSTGRES_POOL_SIZE: '2'
      POSTGRES_MAX_OVERFLOW: '2'
      REDIS_PASSWORD: ci
      REDIS_URL: redis://localhost:6379/0
    services:
      postgres:
        image: timescale/timescaledb:2.26.4-pg18
        env:
          POSTGRES_USER: trader
          POSTGRES_PASSWORD: ci
          POSTGRES_DB: dashboard
        ports: ['5432:5432']
        options: >-
          --health-cmd "pg_isready -U trader"
          --health-interval 5s
          --health-retries 10
      redis:
        image: redis:7-alpine
        ports: ['6379:6379']
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-retries 10
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4.3.1
      - uses: astral-sh/setup-uv@d4b2f3b6ecc6e67c4457f6d3e41ec42d3d0fcb86  # v5.4.2
        with:
          python-version: "3.14"
      - name: Install backend deps
        working-directory: backend
        run: uv sync --frozen
      - name: Generate proto stubs
        working-directory: backend
        run: uv run python scripts/generate_proto_stubs.py
      - name: Run capability drift checks
        working-directory: backend
        run: uv run pytest tests/real_broker/test_real_schwab_capability_drift.py -m real_schwab -v --tb=long --no-header
      - name: Upload drift report
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02  # v4.6.2
        with:
          name: drift-report-${{ github.run_id }}
          path: backend/test-results/
          retention-days: 90

name: Pre-deploy smoke (real IBKR paper)
on:
  workflow_dispatch:
    inputs:
      gateway:
        description: 'Gateway label (isa-paper|normal-paper)'
        required: true
        default: 'isa-paper'
jobs:
  real-ibkr-smoke:
    runs-on: [self-hosted, nuc]
    if: github.repository == 'josephhungkk/trading-dashboard'
    env:
      REAL_IBKR: "1"
      IBKR_PAPER_GATEWAY: ${{ inputs.gateway }}
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4.3.1
      - uses: astral-sh/setup-uv@d4b2f3b6ecc6e67c4457f6d3e41ec42d3d0fcb86  # v5.4.2
        with:
          python-version: '3.14'
      - name: Sync sidecar deps
        working-directory: sidecar
        run: uv sync
      - name: Run real-IBKR smoke
        working-directory: sidecar
        run: uv run pytest tests/test_real_ibkr_smoke.py -v

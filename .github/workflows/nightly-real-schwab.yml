name: nightly-real-schwab

on:
  schedule:
    - cron: '0 12 * * *'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  smoke:
    runs-on: [self-hosted, nuc]
    if: github.repository == 'josephhungkk/trading-dashboard'
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4.3.1
      - uses: astral-sh/setup-uv@d4b2f3b6ecc6e67c4457f6d3e41ec42d3d0fcb86  # v5.4.2
      - name: Install backend deps
        working-directory: backend
        run: uv sync --frozen --all-groups
      - name: Generate proto stubs
        working-directory: backend
        run: uv run python scripts/generate_proto_stubs.py
      - name: Mint fresh Schwab access token
        # Schwab access tokens expire after 30 min. Rather than maintain a
        # short-lived SCHWAB_TEST_ACCESS_TOKEN secret, exchange the 7-day
        # refresh_token for a fresh access token at job-start. Logic lives
        # in backend/scripts/mint_schwab_access_token.py so the same code
        # runs identically on Linux + Windows (the runner is self-hosted
        # Windows for nightly-real-schwab.yml; PowerShell can't parse the
        # bash heredoc form).
        working-directory: backend
        env:
          SCHWAB_APP_KEY: ${{ secrets.SCHWAB_APP_KEY }}
          SCHWAB_APP_SECRET: ${{ secrets.SCHWAB_APP_SECRET }}
          SCHWAB_REFRESH_TOKEN: ${{ secrets.SCHWAB_REFRESH_TOKEN }}
        run: uv run python scripts/mint_schwab_access_token.py
      - name: Pytest (real_schwab smoke)
        working-directory: backend
        env:
          CI_USE_REAL_SCHWAB: '1'
          # SCHWAB_TEST_ACCESS_TOKEN is exported by the previous step via
          # GITHUB_ENV — fresh per run, never read from secrets.
          APP_ENV: dev
          APP_SECRET_KEY: ci-fake-key-not-used-in-this-job
          APP_CORS_ORIGINS: '["http://localhost:5173"]'
          DATABASE_URL: postgresql+asyncpg://x:x@localhost/x
          REDIS_URL: redis://localhost:6379/0
        run: uv run pytest tests/integration/test_real_schwab_smoke.py -v

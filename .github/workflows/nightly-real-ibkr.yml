name: nightly-real-ibkr

on:
  schedule:
    # 22:00 UTC Mon-Fri = 17:00 ET (post-NYSE-close including auction).
    - cron: "0 22 * * 1-5"
  workflow_dispatch:

jobs:
  nightly-ibkr-trade-e2e:
    runs-on: [self-hosted, nuc]
    if: github.repository == 'josephhungkk/trading-dashboard'
    timeout-minutes: 20
    strategy:
      fail-fast: false
      matrix:
        case: [market_spy, trail_percent_spy, moc_spy, gtd_limit_spy]
    env:
      IBKR_PAPER_ACCOUNT: ${{ secrets.IBKR_PAPER_ACCOUNT }}
      CF_ACCESS_CLIENT_ID: ${{ secrets.CF_ACCESS_CLIENT_ID }}
      CF_ACCESS_CLIENT_SECRET: ${{ secrets.CF_ACCESS_CLIENT_SECRET }}
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4.3.1
      - uses: astral-sh/setup-uv@d4b2f3b6ecc6e67c4457f6d3e41ec42d3d0fcb86  # v5.4.2
        with:
          python-version: "3.14"
      - name: Install backend deps
        working-directory: backend
        run: uv sync --frozen
      - name: Run real IBKR trade E2E (${{ matrix.case }})
        working-directory: backend
        shell: powershell
        run: |
          uv run pytest tests/real_broker/test_real_ibkr_e2e.py `
            -m real_ibkr `
            --case ${{ matrix.case }} `
            -v --tb=short --no-header
          # Exit 5 = no tests collected (marker filter); treat as success.
          if ($LASTEXITCODE -eq 5) {
            Write-Host "::notice::No real_ibkr tests collected for case ${{ matrix.case }}."
            exit 0
          }
          exit $LASTEXITCODE
      - name: Upload test results (${{ matrix.case }})
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02  # v4.6.2
        with:
          name: nightly-ibkr-results-${{ github.run_id }}-${{ matrix.case }}
          path: backend/test-results/
          retention-days: 30
      - if: failure()
        run: Write-Host "::error::Nightly real-IBKR ${{ matrix.case }} failed. Check paper Gateway 4002 on the NUC."
        shell: powershell

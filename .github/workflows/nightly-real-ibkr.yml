name: Nightly real-IBKR contract tests

on:
  schedule:
    - cron: '0 6 * * *'
  workflow_dispatch: {}

jobs:
  real-ibkr:
    runs-on: [self-hosted, nuc]
    timeout-minutes: 15
    env:
      CI_USE_REAL_IBKR: '1'
      IBKR_PAPER_PORT: '4002'
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
      - name: Install sidecar deps
        working-directory: sidecar
        run: uv sync --extra dev --frozen
      - name: Generate proto stubs (grpc_tools)
        working-directory: sidecar
        # Force bash; the runner is Windows so the default shell is
        # PowerShell 5.1 which doesn't accept `&&`, here-empty redirects,
        # or `sed -i`. Bash is shipped via Git for Windows on the NUC.
        shell: bash
        run: |
          mkdir -p _generated/broker/v1
          : > _generated/__init__.py
          : > _generated/broker/__init__.py
          : > _generated/broker/v1/__init__.py
          uv run python -m grpc_tools.protoc \
            --proto_path=../proto \
            --python_out=_generated \
            --grpc_python_out=_generated \
            --pyi_out=_generated \
            broker/v1/broker.proto
          sed -i 's|^from broker\.v1 import broker_pb2|from sidecar._generated.broker.v1 import broker_pb2|' \
            _generated/broker/v1/broker_pb2_grpc.py
      - name: Pytest (real_ibkr only)
        working-directory: sidecar
        run: uv run pytest tests/test_handlers_*.py -v -m real_ibkr
      - if: failure()
        run: echo "::error::Nightly real-IBKR contract tests failed. Check ib_async release notes and the paper Gateway 4002 status on the NUC."

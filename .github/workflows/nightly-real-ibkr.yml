name: Nightly real-IBKR contract tests

on:
  schedule:
    - cron: '0 6 * * *'
  workflow_dispatch: {}

jobs:
  real-ibkr:
    runs-on: [self-hosted, nuc]
    timeout-minutes: 15
    env:
      CI_USE_REAL_IBKR: '1'
      IBKR_PAPER_PORT: '4002'
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
      - run: cd proto && buf generate
      - run: cd sidecar && uv sync --extra dev --frozen
      - run: cd sidecar && uv run pytest tests/test_handlers_*.py -v -m real_ibkr
      - if: failure()
        run: echo "::error::Nightly real-IBKR contract tests failed. Check ib_async release notes and the paper Gateway 4002 status on the NUC."

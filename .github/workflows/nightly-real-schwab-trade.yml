name: nightly-real-schwab-trade

on:
  schedule:
    - cron: "0 6 * * 1-5"  # 06:00 UTC Mon-Fri (US market pre-open)
  workflow_dispatch:

jobs:
  nightly-schwab-trade-e2e:
    runs-on: ubuntu-latest
    if: github.repository == 'josephhungkk/trading-dashboard'
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix:
        case: [market_spy, trail_amount_spy, gtd_limit_spy]
    env:
      SCHWAB_APP_KEY: ${{ secrets.SCHWAB_APP_KEY }}
      SCHWAB_APP_SECRET: ${{ secrets.SCHWAB_APP_SECRET }}
      SCHWAB_PAPER_ACCOUNT_HASH: ${{ secrets.SCHWAB_PAPER_ACCOUNT_HASH }}
      SCHWAB_PAPER_SYMBOL: ${{ secrets.SCHWAB_PAPER_SYMBOL || 'F' }}
      DATABASE_URL: postgresql+asyncpg://trader:ci@localhost:5432/dashboard
      APP_SECRET_KEY: ci-secret-key-32-chars-minimum-req
      APP_ENV: dev
      APP_CORS_ORIGINS: '["http://localhost:5173"]'
      POSTGRES_POOL_SIZE: '2'
      POSTGRES_MAX_OVERFLOW: '2'
      REDIS_PASSWORD: ci
      REDIS_URL: redis://localhost:6379/0
    services:
      postgres:
        image: timescale/timescaledb:2.26.4-pg18
        env:
          POSTGRES_USER: trader
          POSTGRES_PASSWORD: ci
          POSTGRES_DB: dashboard
        ports: ['5432:5432']
        options: >-
          --health-cmd "pg_isready -U trader"
          --health-interval 5s
          --health-retries 10
      redis:
        image: redis:7-alpine
        ports: ['6379:6379']
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-retries 10
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4.3.1
      - uses: astral-sh/setup-uv@d4b2f3b6ecc6e67c4457f6d3e41ec42d3d0fcb86  # v5.4.2
        with:
          python-version: "3.14"
      - name: Install backend deps (parent project — proto-stub gen needs it)
        working-directory: backend
        run: uv sync --frozen
      - name: Generate proto stubs
        working-directory: backend
        run: uv run python scripts/generate_proto_stubs.py
      # Phase 10a.5.1 C4: real_broker is a standalone uv project.
      - name: Install real-broker test deps
        working-directory: backend/tests/real_broker
        run: uv sync --frozen
      # Phase 10a.5.1 ops debt fix: seed schwabdev's SQLite token DB from a
      # base64 secret BEFORE pytest invokes schwabdev.Client(). Without this,
      # schwabdev triggers an interactive OAuth flow that prints the
      # authorization URL to stdin and blocks waiting for the operator to
      # paste the redirected URL — in CI that hangs until job timeout.
      # Each matrix case gets its own copy of the seed so concurrent token-
      # refresh writes don't collide ("database is locked") and Schwab
      # doesn't revoke the refresh-token from 3 parallel refresh requests.
      # If SCHWAB_TOKENS_DB_B64 is unset the tests skip gracefully (see
      # test_real_schwab_e2e_*.py for the skip branch).
      - name: Seed schwabdev token DB
        env:
          SCHWAB_TOKENS_DB_B64: ${{ secrets.SCHWAB_TOKENS_DB_B64 }}
        run: |
          if [ -z "$SCHWAB_TOKENS_DB_B64" ]; then
            echo "::warning::SCHWAB_TOKENS_DB_B64 secret unset — tests will skip."
            exit 0
          fi
          mkdir -p /tmp
          echo "$SCHWAB_TOKENS_DB_B64" | base64 -d > "/tmp/nightly_tokens_${{ matrix.case }}.db"
          echo "Seeded /tmp/nightly_tokens_${{ matrix.case }}.db ($(wc -c < /tmp/nightly_tokens_${{ matrix.case }}.db) bytes)"
      - name: Run real Schwab trade E2E (Phase 8a place + cancel + modify)
        working-directory: backend/tests/real_broker
        env:
          SCHWAB_TOKENS_DB: /tmp/nightly_tokens_${{ matrix.case }}.db
        run: uv run pytest . -m real_schwab -v --tb=short --no-header -q --case ${{ matrix.case }}
      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02  # v4.6.2
        with:
          name: nightly-schwab-trade-results-${{ github.run_id }}-${{ matrix.case }}
          path: backend/test-results/
          retention-days: 30

name: nightly-real-schwab-trade

on:
  schedule:
    - cron: "0 6 * * 1-5"  # 06:00 UTC Mon-Fri (US market pre-open)
  workflow_dispatch:

jobs:
  nightly-schwab-trade-e2e:
    runs-on: ubuntu-latest
    if: github.repository == 'josephhungkk/trading-dashboard'
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix:
        case: [market_spy, trail_amount_spy, gtd_limit_spy]
    env:
      SCHWAB_APP_KEY: ${{ secrets.SCHWAB_APP_KEY }}
      SCHWAB_APP_SECRET: ${{ secrets.SCHWAB_APP_SECRET }}
      SCHWAB_PAPER_ACCOUNT_HASH: ${{ secrets.SCHWAB_PAPER_ACCOUNT_HASH }}
      SCHWAB_PAPER_SYMBOL: ${{ secrets.SCHWAB_PAPER_SYMBOL || 'F' }}
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4.3.1
      - uses: astral-sh/setup-uv@d4b2f3b6ecc6e67c4457f6d3e41ec42d3d0fcb86  # v5.4.2
        with:
          python-version: "3.14"
      - name: Install backend deps
        working-directory: backend
        run: uv sync --frozen
      - name: Generate proto stubs
        working-directory: backend
        run: |
          mkdir -p app/_generated/broker/v1
          : > app/_generated/__init__.py
          : > app/_generated/broker/__init__.py
          : > app/_generated/broker/v1/__init__.py
          uv run python -m grpc_tools.protoc \
            --proto_path=../proto \
            --python_out=app/_generated \
            --grpc_python_out=app/_generated \
            --pyi_out=app/_generated \
            broker/v1/broker.proto
          sed -i 's|^from broker\.v1 import broker_pb2|from app._generated.broker.v1 import broker_pb2|' \
            app/_generated/broker/v1/broker_pb2_grpc.py
      - name: Run real Schwab trade E2E (Phase 8a place + cancel + modify)
        working-directory: backend
        run: |
          uv run pytest tests/real_broker/ -m real_schwab -v \
            --tb=short --no-header -q \
            --case ${{ matrix.case }}
      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02  # v4.6.2
        with:
          name: nightly-schwab-trade-results-${{ github.run_id }}-${{ matrix.case }}
          path: backend/test-results/
          retention-days: 30

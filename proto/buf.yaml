version: v2
modules:
  - path: broker
lint:
  use:
    - STANDARD
  except:
    # Module root is `broker/`, file lives at `broker/v1/broker.proto` with
    # package `broker.v1` — buf wants the file at `broker/v1/...` relative to
    # the module root (i.e. one extra `broker/` on disk). Restructuring would
    # break the generated import path `from broker.v1 import broker_pb2`
    # that sidecar/ibkr_sidecar.py and backend/app/services/brokers.py use.
    - PACKAGE_DIRECTORY_MATCH
    # The service is intentionally named `Broker` (not `BrokerService`); mTLS
    # callers and four cross-language stubs pin that name. Renaming would
    # cascade through backend tests, sidecar handlers, and the PowerShell
    # probe — out of scope for v0.4.0 (spec §4.1).
    - SERVICE_SUFFIX
    # `AccountRef` and `Empty` are intentionally shared across RPCs (they
    # carry only `account_number` / nothing). Pulling them apart into N
    # `<RPC>Request` types would duplicate the same field for no contract
    # benefit; revisit when an RPC actually needs request-type-specific
    # fields beyond the shared ref.
    - RPC_REQUEST_STANDARD_NAME
    - RPC_RESPONSE_STANDARD_NAME
    - RPC_REQUEST_RESPONSE_UNIQUE
    # Enum values use bare names (LIVE, PAPER, IBKR, STOCK, BUY, SELL, ...)
    # rather than enum-name-prefixed (TRADING_MODE_LIVE, BROKER_ID_IBKR, ...).
    # Generated Python references them as broker_pb2.LIVE / broker_pb2.IBKR
    # in 5+ source files (backend brokers.py, sidecar handlers, normalize.py,
    # in-process gRPC e2e harness, golden-trace replay tests). Renaming would
    # cascade everywhere — defer to a Phase 4.x proto-style sweep.
    - ENUM_VALUE_PREFIX
    - ENUM_ZERO_VALUE_SUFFIX
breaking:
  use:
    - FILE

// proto/broker/v1.proto
// Broker adapter contract — Phase 4 (read-only IBKR), reused by Phases 5-8.
// Spec: docs/superpowers/specs/2026-04-25-phase4-ibkr-adapter-design.md §4.1.
//
// Invariants:
// - All monetary values are Money (decimal-as-string + currency). Never float.
// - All quantities are decimal-as-string. Fractional shares supported.
// - Position.unrealized_pnl comes from IB.reqPnLSingle(), not naive math.
// - UK-listed-stock pence quotes are normalized to pounds inside the sidecar.
// - Account.gateway_label and Account.account_number are sidecar->backend
//   internal; backend's AccountResponse strips both at the REST boundary.

syntax = "proto3";
package broker.v1;

import "google/protobuf/timestamp.proto";

service Broker {
  rpc Health(HealthRequest) returns (HealthResponse);
  rpc ListManagedAccounts(Empty) returns (AccountsResponse);
  rpc GetAccountSummary(AccountRef) returns (SummaryResponse);
  rpc GetPositions(AccountRef) returns (PositionsResponse);
  rpc GetOrders(AccountRef) returns (OrdersResponse);
  rpc GetContract(ContractRef) returns (ContractResponse);
  rpc PlaceOrder(PlaceOrderRequest) returns (PlaceOrderResponse);
  rpc CancelOrder(CancelOrderRequest) returns (CancelOrderResponse);
  rpc OrderEvent(AccountRef) returns (stream OrderEventMessage);
  rpc SearchContracts(SearchContractsRequest) returns (SearchContractsResponse);
  rpc ModifyOrder(ModifyOrderRequest) returns (ModifyOrderResponse);
  rpc PlaceBracket(PlaceBracketRequest) returns (PlaceBracketResponse);
  // Phase 6: backend ships per-sidecar credentials (futu unlock + RSA priv)
  // at registry boot. IBKR sidecars implement as no-op-returning-ok.
  rpc Configure(ConfigureRequest) returns (ConfigureResponse);
  // Phase 7b.1 — bidirectional streaming quotes. Backend dials sidecar
  // (sidecar = gRPC server, matches Health/GetPositions). Subscribe/Unsubscribe/
  // Resync/Heartbeat travel client→server; QuoteMessage travels server→client.
  // See spec docs/superpowers/specs/2026-05-04-phase7b1-streaming-quotes-design.md §4.2.
  rpc StreamQuotes(stream StreamQuotesRequest) returns (stream QuoteMessage);
}

enum BrokerId {
  BROKER_UNSPECIFIED = 0;
  IBKR = 1;
  FUTU = 2;
  SCHWAB = 3;
}

enum TradingMode {
  MODE_UNSPECIFIED = 0;
  LIVE = 1;
  PAPER = 2;
}

enum AssetClass {
  ASSET_UNSPECIFIED = 0;
  STOCK = 1;
  ETF = 2;
  OPTION = 3;
  FUTURE = 4;
  FOREX = 5;
  CRYPTO = 6;
  BOND = 7;
  MUTUAL_FUND = 8;
  WARRANT = 9;
  CBBC = 10;  // HK callable bull/bear contract (牛熊證) — Phase 6 (M1)
}

enum OrderSide {
  SIDE_UNSPECIFIED = 0;
  BUY = 1;
  SELL = 2;
}

enum OrderType {
  option allow_alias = true;

  ORDER_TYPE_UNSPECIFIED = 0;
  ORDER_TYPE_MARKET = 1;
  ORDER_TYPE_LIMIT = 2;
  ORDER_TYPE_STOP = 3;
  ORDER_TYPE_STOP_LIMIT = 4;
  ORDER_TYPE_TRAIL = 5;
  TRAIL = 5;
  ORDER_TYPE_TRAIL_LIMIT = 6;
  TRAIL_LIMIT = 6;
  ORDER_TYPE_MOC = 7;
  ORDER_TYPE_MOO = 8;
  ORDER_TYPE_LOC = 9;
  ORDER_TYPE_LOO = 10;
}

enum TimeInForce {
  option allow_alias = true;

  TIF_UNSPECIFIED = 0;
  TIF_DAY = 1;
  TIF_GTC = 2;
  TIF_IOC = 3;
  TIF_FOK = 4;
  TIF_GTD = 5;
  GTD = 5;
}

enum OrderStatus {
  STATUS_UNSPECIFIED = 0;
  PENDING = 1;
  SUBMITTED = 2;
  PARTIAL = 3;
  FILLED = 4;
  CANCELLED = 5;
  REJECTED = 6;
}

message Empty {}

message HealthRequest {}
message HealthResponse {
  // "isa-live", "isa-paper", "normal-live", "normal-paper"
  string label = 1;
  // ib_async.isConnected()
  bool gateway_connected = 2;
  // str(ib.client.serverVersion()) when connected, "" otherwise
  string gateway_version = 3;
  // useful for staleness detection (last broker-side tick observed)
  google.protobuf.Timestamp last_tick_at = 4;
  // git SHA at sidecar build time; lets the watchdog detect drift
  string sidecar_version = 5;
  // Phase 6 H2: sidecar process boot time. Backend keys _configured by this
  // value so a sidecar restart triggers a fresh Configure RPC.
  google.protobuf.Timestamp started_at = 6;
  // Phase 6 H4: sidecar self-reports broker_id; backend cross-checks against
  // SIDECAR_BROKERS map. Mismatch fires BrokerLabelMismatch page alert.
  // Values: "ibkr" | "futu" | "schwab".
  string broker_id = 7;
}

// gateway_label and account_number are sidecar->backend internal.
// AccountResponse (Pydantic, in backend/app/brokers/base.py) strips both
// before serializing to REST callers.
message Account {
  string account_number = 1;
  TradingMode mode = 2;
  string gateway_label = 3;
  // Sourced from accountSummary BASE tag (e.g., "USD", "GBP"). NOT defaulted.
  string currency_base = 4;
  // Phase 7a — Schwab privacy-layer hash from /accountNumbers; required on
  // every Schwab REST path. Empty for IBKR/Futu. PII-equivalent: never
  // logged; backend's AccountResponse boundary-strips before REST output.
  string account_hash = 5;
}
message AccountsResponse {
  repeated Account accounts = 1;
}
message AccountRef {
  string account_number = 1;
}

// Decimal-as-string. Never float across the wire.
message Money {
  string value = 1;
  string currency = 2;
}

message Summary {
  Money net_liquidation = 1;
  Money total_cash = 2;
  Money realized_pnl = 3;
  Money unrealized_pnl = 4;
  Money buying_power = 5;
  google.protobuf.Timestamp updated_at = 6;
}
message SummaryResponse {
  Summary summary = 1;
}

message Contract {
  string symbol = 1;
  string exchange = 2;
  string currency = 3;
  AssetClass asset_class = 4;
  // IBKR contract id, as string
  string conid = 5;
  string local_symbol = 6;
  // Contract multiplier (50 for futures @ES, 100 for options, 1 for stocks).
  // Sourced from ib_async.Contract.multiplier; defaults to "1" when absent.
  string multiplier = 7;
}
message ContractRef {
  string conid = 1;
}
message ContractResponse {
  Contract contract = 1;
}

message Position {
  Contract contract = 1;
  // decimal-as-string
  string quantity = 2;
  Money avg_cost = 3;
  Money market_price = 4;
  Money market_value = 5;
  // Sourced from IB.reqPnLSingle(); NEVER computed naively per stock_splits.md.
  Money unrealized_pnl = 6;
  Money realized_pnl_today = 7;
  Money daily_pnl = 8;
}
message PositionsResponse {
  repeated Position positions = 1;
}

message Order {
  string order_id = 1;
  Contract contract = 2;
  OrderSide side = 3;
  OrderType order_type = 4;
  string quantity = 5;
  Money limit_price = 6;
  Money stop_price = 7;
  TimeInForce time_in_force = 8;
  OrderStatus status = 9;
  string quantity_filled = 10;
  Money avg_fill_price = 11;
  google.protobuf.Timestamp submitted_at = 12;
  google.protobuf.Timestamp updated_at = 13;
  // Phase 7a M2 — true when avg_fill_price was inferred from limit_price
  // because the upstream broker JSON omitted execution-leg detail (e.g.,
  // Schwab's `orderActivityCollection` missing on a FILLED order). UI
  // dims the value when this flag is true.
  bool avg_fill_price_inferred = 14;
  // Phase 8b reserved tags 21-24 (see docs/superpowers/specs/2026-05-06-phase8b-order-type-expansion-design.md)
  string trail_offset = 21;        // Decimal-as-string e.g. "0.50" or "5.0"
  string trail_offset_type = 22;   // "AMOUNT" | "PERCENT"
  string trail_limit_offset = 23;  // Decimal — TRAIL_LIMIT only
  string expiry_date = 24;         // ISO "YYYY-MM-DD" — GTD only
}
message OrdersResponse {
  repeated Order orders = 1;
}

message PlaceOrderRequest {
  string account_number = 1;
  string client_order_id = 2; // UUID4 from frontend; sidecar sets ib_order.orderRef = this
  string conid = 3; // resolved by SearchContracts upstream
  string side = 4; // "BUY" | "SELL"
  string order_type = 5; // "MARKET" | "LIMIT" | "STOP"
  string tif = 6; // "DAY" | "GTC"
  string qty = 7; // decimal-as-string, fixed-point 8 digits
  string limit_price = 8; // decimal-as-string, "" for MARKET
  string stop_price = 9; // decimal-as-string, "" unless STOP
  // Phase 8b reserved tags 21-24 (see docs/superpowers/specs/2026-05-06-phase8b-order-type-expansion-design.md)
  string trail_offset = 21;        // Decimal-as-string e.g. "0.50" or "5.0"
  string trail_offset_type = 22;   // "AMOUNT" | "PERCENT"
  string trail_limit_offset = 23;  // Decimal — TRAIL_LIMIT only
  string expiry_date = 24;         // ISO "YYYY-MM-DD" — GTD only
  string oco_group_id = 25;   // optional OCA group identifier (≤32 chars) for OCO placement (Phase 8b T-O.8)
  reserved 10 to 20; // forward-extension reservations (R35)
}

message PlaceOrderResponse {
  string broker_order_id = 1; // ib_async permId, populated within ack window
  string status = 2; // initial status from ib_async (PendingSubmit etc.)
}

message ModifyOrderRequest {
  string broker_order_id = 1;
  string account_number = 2;
  Contract contract = 3;
  OrderSide side = 4;
  OrderType order_type = 5;
  TimeInForce tif = 6;
  string qty = 7;
  Money limit_price = 8;
  Money stop_price = 9;
  string client_order_id = 10;
  // Phase 8b reserved tags 21-24 (see docs/superpowers/specs/2026-05-06-phase8b-order-type-expansion-design.md)
  string trail_offset = 21;        // Decimal-as-string e.g. "0.50" or "5.0"
  string trail_offset_type = 22;   // "AMOUNT" | "PERCENT"
  string trail_limit_offset = 23;  // Decimal — TRAIL_LIMIT only
  string expiry_date = 24;         // ISO "YYYY-MM-DD" — GTD only
}

message ModifyOrderResponse {
  string broker_order_id = 1;
  string status = 2;
  string parent_broker_order_id = 3;
}

message PlaceBracketRequest {
  PlaceOrderRequest parent = 1;
  PlaceOrderRequest stop_loss = 2;
  PlaceOrderRequest take_profit = 3;
  string oca_group = 4;
  bool has_stop_loss = 5;
  bool has_take_profit = 6;
}

message PlaceBracketResponse {
  string parent_broker_order_id = 1;
  string stop_loss_broker_order_id = 2;
  string take_profit_broker_order_id = 3;
  string status = 4;
}

message CancelOrderRequest {
  string account_number = 1;
  string broker_order_id = 2;
}

message CancelOrderResponse {
  bool accepted = 1;
}

message OrderEventMessage {
  string broker_order_id = 1;
  string client_order_id = 2; // echoed back if known
  string status = 3; // PendingSubmit|Submitted|PreSubmitted|Filled|Cancelled|ApiCancelled|Inactive
  string filled_qty = 4; // decimal-as-string, cumulative
  string avg_fill_price = 5;
  google.protobuf.Timestamp event_at = 6;
  string raw_payload = 7; // jsonb-friendly debug blob (ib_async Trade snapshot)
  string exec_id = 8;
  string kind = 9;
}

message SearchContractsRequest {
  string query = 1; // symbol fragment, e.g. "AAPL", "0700.HK"
  string asset_class = 2; // "STK" | "FUT" | "OPT" | "" (any)
}

message SearchContractsResponse {
  repeated Contract contracts = 1; // existing Contract message reused
}

// Phase 6: per-sidecar credential bootstrap. Validation-only at the sidecar
// side (parses RSA PEM, regex-checks MD5 hex). InitConnect runs in a
// background task; ok=true does NOT mean OpenD reachable. See spec §4.2.
message ConfigureRequest {
  // 32-char lowercase hex MD5 of the trading password (for futu unlock_trade).
  string unlock_pwd_md5 = 1;
  // PEM-encoded RSA private key (1024-bit per Futu requirement; 2048-bit
  // fails InitConnect per memory futu_1024_rsa_key.md). ~1.2KB ASCII PEM,
  // well under gRPC default 4MB; `string` is correct, not `bytes`.
  string rsa_priv_pem = 2;
  string opend_host = 3;
  int32 opend_port = 4;
  string connection_id = 5;
  // Future creds without proto edits.
  map<string, string> metadata = 6;
}

message ConfigureResponse {
  bool ok = 1;
  // Empty on success; "invalid_unlock_pwd_md5" or "invalid_rsa_pem" on
  // validation rejection.
  string detail = 2;
}

// ===== Phase 7b.1 streaming quotes =====

message StreamQuotesRequest {
  oneof op {
    Subscribe   subscribe   = 1;
    Unsubscribe unsubscribe = 2;
    Heartbeat   heartbeat   = 3;
    Resync      resync      = 4;
  }

  message Subscribe   { repeated SymbolRef symbols = 1; }
  message Unsubscribe { repeated SymbolRef symbols = 1; }
  message Heartbeat {
    google.protobuf.Timestamp client_time = 1;
    int32 tick_count_received = 2;
  }
  // Sidecar reconciles its upstream-broker refcount against `expected`; only
  // diff propagates to broker socket. Used when gRPC reconnects but sidecar
  // process didn't restart (Health.started_at unchanged).
  message Resync { repeated SymbolRef expected = 1; }
}

message SymbolRef {
  string canonical_id = 1;
  string raw_symbol   = 2;
  AssetClass asset_class = 3;
  string exchange     = 4;
  string currency     = 5;
  bytes  source_meta  = 6;
  reserved 7 to 15;  // Phase 12/14 contract_extra extensions
}

message QuoteMessage {
  string canonical_id = 1;
  google.protobuf.Timestamp tick_time   = 2;
  google.protobuf.Timestamp received_at = 3;
  string source = 4;
  // Reserved tags 5-9: future top-level metadata (e.g. sequence_number,
  // partition_key) without disturbing the price block below.
  reserved 5 to 9;

  string last       = 10;
  string bid        = 11;
  string ask        = 12;
  string volume     = 13;
  string day_high   = 14;
  string day_low    = 15;
  string open       = 16;
  string prev_close = 17;
  string change_pct = 18;
  string change     = 19;
  // Reserved tags 20-29: future price-block extensions (mid, vwap, last_size,
  // bid_size, ask_size, etc.) — kept contiguous with the price band.
  reserved 20 to 29;

  bool   is_delayed     = 30;
  int32  delay_seconds  = 31;
  // Reserved tags 32-89: future staleness/feed-state extensions
  // (e.g. is_trading_halted, halt_reason, feed_status, market_session).
  reserved 32 to 89;

  bytes  raw_payload    = 90;
  // Reserved tags 91-200: keep open for future debug/trace fields, but tag 90
  // is the canonical "escape hatch" — bump only with a clear reason.
  reserved 91 to 200;
}

// Phase 7a — sidecar→backend single-writer token-refresh callback (architect C2).
// This service is implemented by the BACKEND (not by sidecars). Sidecars are
// gRPC clients of this service when they need a fresh token pair. Backend
// holds the PG advisory lock during the actual refresh; sidecars never call
// Schwab's /oauth/token endpoint directly.
service BackendCallback {
  // broker_id selects which broker's tokens to refresh. Only "schwab"
  // currently uses this path; other brokers reuse their existing auth.
  rpc RequestTokenRefresh(TokenRefreshRequest) returns (TokenRefreshResponse);
}

message TokenRefreshRequest {
  string broker_id = 1;  // "schwab" — distinguishes if other brokers ever need this pattern
}

message TokenRefreshResponse {
  string access_token = 1;
  string refresh_token = 2;
  google.protobuf.Timestamp access_issued_at = 3;
}

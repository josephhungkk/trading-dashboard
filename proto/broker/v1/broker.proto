// proto/broker/v1.proto
// Broker adapter contract — Phase 4 (read-only IBKR), reused by Phases 5-8.
// Spec: docs/superpowers/specs/2026-04-25-phase4-ibkr-adapter-design.md §4.1.
//
// Invariants:
// - All monetary values are Money (decimal-as-string + currency). Never float.
// - All quantities are decimal-as-string. Fractional shares supported.
// - Position.unrealized_pnl comes from IB.reqPnLSingle(), not naive math.
// - UK-listed-stock pence quotes are normalized to pounds inside the sidecar.
// - Account.gateway_label and Account.account_number are sidecar->backend
//   internal; backend's AccountResponse strips both at the REST boundary.

syntax = "proto3";
package broker.v1;

import "google/protobuf/timestamp.proto";
import "google/protobuf/empty.proto";

service Broker {
  rpc Health(HealthRequest) returns (HealthResponse);
  rpc ListManagedAccounts(Empty) returns (AccountsResponse);
  rpc GetAccountSummary(AccountRef) returns (SummaryResponse);
  rpc GetPositions(AccountRef) returns (PositionsResponse);
  rpc GetOrders(AccountRef) returns (OrdersResponse);
  rpc GetContract(ContractRef) returns (ContractResponse);
  // Phase 22a.1 — sector classification from IBKR reqContractDetails
  rpc GetContractFundamentals(ContractRef) returns (ContractFundamentalsResponse);
  rpc PlaceOrder(PlaceOrderRequest) returns (PlaceOrderResponse);
  rpc CancelOrder(CancelOrderRequest) returns (CancelOrderResponse);
  rpc OrderEvent(AccountRef) returns (stream OrderEventMessage);
  rpc SearchContracts(SearchContractsRequest) returns (SearchContractsResponse);
  rpc ModifyOrder(ModifyOrderRequest) returns (ModifyOrderResponse);
  rpc PlaceBracket(PlaceBracketRequest) returns (PlaceBracketResponse);
  // Phase 6: backend ships per-sidecar credentials (futu unlock + RSA priv)
  // at registry boot. IBKR sidecars implement as no-op-returning-ok.
  rpc Configure(ConfigureRequest) returns (ConfigureResponse);
  // Phase 7b.1 — bidirectional streaming quotes. Backend dials sidecar
  // (sidecar = gRPC server, matches Health/GetPositions). Subscribe/Unsubscribe/
  // Resync/Heartbeat travel client→server; QuoteMessage travels server→client.
  // See spec docs/superpowers/specs/2026-05-04-phase7b1-streaming-quotes-design.md §4.2.
  rpc StreamQuotes(stream StreamQuotesRequest) returns (stream QuoteMessage);
  // Phase 9 — historical OHLCV backfill. BarService calls this for cache misses
  // and pre-warm; sidecar chunks/paces internally per broker SDK quotas.
  // See docs/superpowers/specs/2026-05-07-phase9-charting-design.md §4 lines 622-645.
  rpc GetHistoricalBars(GetHistoricalBarsRequest) returns (GetHistoricalBarsResponse);
  // Phase 10a — pre-trade margin/risk preview RPC. IBKR uses ib_async
  // placeOrder(whatIf=True) + filledEvent.wait; Schwab uses POST
  // /trader/v1/accounts/{accountHash}/previewOrder; Alpaca returns
  // UNIMPLEMENTED. Money fields are Decimal-strings per [C2].
  // Spec: docs/superpowers/specs/2026-05-08-phase10a-risk-engine-design.md §5.
  rpc PreviewOrder(PreviewOrderRequest) returns (PreviewOrderResponse);
  // ── Phase 12: Options ───────────────────────────────────────────────────
  rpc GetOptionChain(OptionChainRequest) returns (OptionChainResponse);
  rpc GetOptionExpirations(OptionExpirationsRequest) returns (OptionExpirationsResponse);
  rpc StreamOptionGreeks(OptionGreeksRequest) returns (stream OptionGreeksResponse);
  rpc ExerciseOption(ExerciseOptionRequest) returns (ExerciseOptionResponse);
  // Phase 13: Multi-leg option combos
  rpc PlaceCombo(PlaceComboRequest) returns (PlaceComboResponse);
  rpc GetSupportedComboStrategies(GetSupportedComboStrategiesRequest) returns (GetSupportedComboStrategiesResponse);
  rpc GetFutureContracts(GetFutureContractsRequest) returns (GetFutureContractsResponse);
  rpc StreamSettlementEvents(StreamSettlementEventsRequest) returns (stream SettlementEvent);
  rpc RequestFxQuote(FxQuoteRequest) returns (FxQuoteResponse);
  rpc AcceptFxQuote(FxAcceptRequest) returns (FxAcceptResponse);
  rpc CancelFxQuote(FxCancelRequest) returns (google.protobuf.Empty);
  rpc StreamFxRates(google.protobuf.Empty) returns (stream FxMidRate);
  rpc ListCryptoAssets(ListCryptoAssetsRequest) returns (ListCryptoAssetsResponse);
  // Phase 16a: Bonds
  rpc SearchBonds(SearchBondsRequest) returns (SearchBondsResponse);
  rpc GetBondAccruedInterest(GetBondAccruedInterestRequest) returns (GetBondAccruedInterestResponse);
  // Phase 16b: Mutual Funds
  rpc SearchFunds(SearchFundsRequest) returns (SearchFundsResponse);
  // Phase 16c: CFDs
  rpc SearchCFDs(SearchCFDsRequest) returns (SearchCFDsResponse);
}

message CryptoAsset {
  string symbol = 1;
  string base_asset = 2;
  string quote_asset = 3;
  string min_qty = 4;
  string qty_step = 5;
  string min_notional = 6;
  bool available_24h = 7;
}

message ListCryptoAssetsRequest {
  string account_id = 1;
}

message ListCryptoAssetsResponse {
  repeated CryptoAsset assets = 1;
}

// Phase 10a — PreviewOrder messages (spec §5).
message PreviewOrderRequest {
  string account_hash = 1;
  string side = 2; // "buy" | "sell" — matches risk_service EvaluationContext.side
  string symbol = 3; // canonical/instrument symbol
  string asset_class = 4; // "STOCK" | "ETF" | "OPTION" | ...
  string order_type = 5; // "MKT" | "LMT" | "STP" | "STP_LMT"
  string time_in_force = 6; // "DAY" | "GTC" | ...
  string qty = 7; // Decimal-string [C2]
  optional string limit_price = 8; // Decimal-string [C2]
  optional string stop_price = 9; // Decimal-string [C2]
  string idempotency_key = 10; // blake2b content-hash; "preview:" prefix [M6]
}

message PreviewOrderResponse {
  bool accepted = 1;
  string reject_reason = 2;
  optional string initial_margin = 3; // Decimal-string [C2]
  optional string maintenance_margin = 4; // Decimal-string [C2]
  optional string commission = 5; // Decimal-string [C2]
  optional string available_funds_after = 6; // Decimal-string [C2]
  optional string buying_power_after = 7; // Decimal-string [C2]
  repeated string warnings = 8;
  string raw_provider_payload = 9;
}

message GetHistoricalBarsRequest {
  string canonical_id = 1;
  string timeframe = 2; // "1m" only — sub-1m has no historical source
  google.protobuf.Timestamp range_start = 3;
  google.protobuf.Timestamp range_end = 4;
  int32 limit = 5; // pacing budget; sidecar may chunk internally
}
message GetHistoricalBarsResponse {
  repeated HistoricalBar bars = 1;
  bool truncated = 2; // true if more bars exist past range_end (pacing cap hit)
}
message HistoricalBar {
  google.protobuf.Timestamp bucket_start = 1;
  string open = 2; // string-encoded NUMERIC(20,8) per project convention
  string high = 3;
  string low = 4;
  string close = 5;
  string volume = 6;
  int32 trade_count = 7;
}

enum BrokerId {
  BROKER_UNSPECIFIED = 0;
  IBKR = 1;
  FUTU = 2;
  SCHWAB = 3;
}

enum TradingMode {
  MODE_UNSPECIFIED = 0;
  LIVE = 1;
  PAPER = 2;
}

enum AssetClass {
  ASSET_UNSPECIFIED = 0;
  STOCK = 1;
  ETF = 2;
  OPTION = 3;
  FUTURE = 4;
  FOREX = 5;
  CRYPTO = 6;
  BOND = 7;
  MUTUAL_FUND = 8;
  WARRANT = 9;
  CBBC = 10; // HK callable bull/bear contract (牛熊證) — Phase 6 (M1)
}

enum OrderSide {
  SIDE_UNSPECIFIED = 0;
  BUY = 1;
  SELL = 2;
}

enum OrderType {
  option allow_alias = true;

  ORDER_TYPE_UNSPECIFIED = 0;
  ORDER_TYPE_MARKET = 1;
  ORDER_TYPE_LIMIT = 2;
  ORDER_TYPE_STOP = 3;
  ORDER_TYPE_STOP_LIMIT = 4;
  ORDER_TYPE_TRAIL = 5;
  TRAIL = 5;
  ORDER_TYPE_TRAIL_LIMIT = 6;
  TRAIL_LIMIT = 6;
  ORDER_TYPE_MOC = 7;
  ORDER_TYPE_MOO = 8;
  ORDER_TYPE_LOC = 9;
  ORDER_TYPE_LOO = 10;
}

enum TimeInForce {
  option allow_alias = true;

  TIF_UNSPECIFIED = 0;
  TIF_DAY = 1;
  TIF_GTC = 2;
  TIF_IOC = 3;
  TIF_FOK = 4;
  TIF_GTD = 5;
  GTD = 5;
}

enum OrderStatus {
  STATUS_UNSPECIFIED = 0;
  PENDING = 1;
  SUBMITTED = 2;
  PARTIAL = 3;
  FILLED = 4;
  CANCELLED = 5;
  REJECTED = 6;
}

message Empty {}

message HealthRequest {}
message HealthResponse {
  // "isa-live", "isa-paper", "normal-live", "normal-paper"
  string label = 1;
  // ib_async.isConnected()
  bool gateway_connected = 2;
  // str(ib.client.serverVersion()) when connected, "" otherwise
  string gateway_version = 3;
  // useful for staleness detection (last broker-side tick observed)
  google.protobuf.Timestamp last_tick_at = 4;
  // git SHA at sidecar build time; lets the watchdog detect drift
  string sidecar_version = 5;
  // Phase 6 H2: sidecar process boot time. Backend keys _configured by this
  // value so a sidecar restart triggers a fresh Configure RPC.
  google.protobuf.Timestamp started_at = 6;
  // Phase 6 H4: sidecar self-reports broker_id; backend cross-checks against
  // SIDECAR_BROKERS map. Mismatch fires BrokerLabelMismatch page alert.
  // Values: "ibkr" | "futu" | "schwab".
  string broker_id = 7;
}

// gateway_label and account_number are sidecar->backend internal.
// AccountResponse (Pydantic, in backend/app/brokers/base.py) strips both
// before serializing to REST callers.
message Account {
  string account_number = 1;
  TradingMode mode = 2;
  string gateway_label = 3;
  // Sourced from accountSummary BASE tag (e.g., "USD", "GBP"). NOT defaulted.
  string currency_base = 4;
  // Phase 7a — Schwab privacy-layer hash from /accountNumbers; required on
  // every Schwab REST path. Empty for IBKR/Futu. PII-equivalent: never
  // logged; backend's AccountResponse boundary-strips before REST output.
  string account_hash = 5;
}
message AccountsResponse {
  repeated Account accounts = 1;
}
message AccountRef {
  string account_number = 1;
}

// Decimal-as-string. Never float across the wire.
message Money {
  string value = 1;
  string currency = 2;
}

message Summary {
  Money net_liquidation = 1;
  Money total_cash = 2;
  Money realized_pnl = 3;
  Money unrealized_pnl = 4;
  Money buying_power = 5;
  google.protobuf.Timestamp updated_at = 6;
}
message SummaryResponse {
  Summary summary = 1;
}

message Contract {
  string symbol = 1;
  string exchange = 2;
  string currency = 3;
  AssetClass asset_class = 4;
  // IBKR contract id, as string
  string conid = 5;
  string local_symbol = 6;
  // Contract multiplier (50 for futures @ES, 100 for options, 1 for stocks).
  // Sourced from ib_async.Contract.multiplier; defaults to "1" when absent.
  string multiplier = 7;
}
message ContractRef {
  string conid = 1;
}
message ContractResponse {
  Contract contract = 1;
}

message ContractFundamentalsResponse {
  string industry = 1;
  string category = 2;
  string primary_exchange = 3;
  string country = 4;
}

message Position {
  Contract contract = 1;
  // decimal-as-string
  string quantity = 2;
  Money avg_cost = 3;
  Money market_price = 4;
  Money market_value = 5;
  // Sourced from IB.reqPnLSingle(); NEVER computed naively per stock_splits.md.
  Money unrealized_pnl = 6;
  Money realized_pnl_today = 7;
  Money daily_pnl = 8;
}
message PositionsResponse {
  repeated Position positions = 1;
}

message Order {
  string order_id = 1;
  Contract contract = 2;
  OrderSide side = 3;
  OrderType order_type = 4;
  string quantity = 5;
  Money limit_price = 6;
  Money stop_price = 7;
  TimeInForce time_in_force = 8;
  OrderStatus status = 9;
  string quantity_filled = 10;
  Money avg_fill_price = 11;
  google.protobuf.Timestamp submitted_at = 12;
  google.protobuf.Timestamp updated_at = 13;
  // Phase 7a M2 — true when avg_fill_price was inferred from limit_price
  // because the upstream broker JSON omitted execution-leg detail (e.g.,
  // Schwab's `orderActivityCollection` missing on a FILLED order). UI
  // dims the value when this flag is true.
  bool avg_fill_price_inferred = 14;
  string cash_amount = 15; // Phase 8c reserved tag 15
  reserved 16 to 20; // forward-extension reservations (R35)
  // Phase 8b reserved tags 21-24 (see docs/superpowers/specs/2026-05-06-phase8b-order-type-expansion-design.md)
  string trail_offset = 21; // Decimal-as-string e.g. "0.50" or "5.0"
  string trail_offset_type = 22; // "AMOUNT" | "PERCENT"
  string trail_limit_offset = 23; // Decimal — TRAIL_LIMIT only
  string expiry_date = 24; // ISO "YYYY-MM-DD" — GTD only
  optional string algo_strategy = 25;  // Phase 17: algo strategy name when order was placed via algo
  reserved 26 to 35;  // algo + forward-extension
}
message OrdersResponse {
  repeated Order orders = 1;
}

message PlaceOrderRequest {
  string account_number = 1;
  string client_order_id = 2; // UUID4 from frontend; sidecar sets ib_order.orderRef = this
  string conid = 3; // resolved by SearchContracts upstream
  string side = 4; // "BUY" | "SELL"
  string order_type = 5; // "MARKET" | "LIMIT" | "STOP"
  string tif = 6; // "DAY" | "GTC"
  string qty = 7; // decimal-as-string, fixed-point 8 digits
  string limit_price = 8; // decimal-as-string, "" for MARKET
  string stop_price = 9; // decimal-as-string, "" unless STOP
  string cash_amount = 15; // Phase 8c reserved tag 15
  // Phase 8b reserved tags 21-24 (see docs/superpowers/specs/2026-05-06-phase8b-order-type-expansion-design.md)
  string trail_offset = 21; // Decimal-as-string e.g. "0.50" or "5.0"
  string trail_offset_type = 22; // "AMOUNT" | "PERCENT"
  string trail_limit_offset = 23; // Decimal — TRAIL_LIMIT only
  string expiry_date = 24; // ISO "YYYY-MM-DD" — GTD only
  string oco_group_id = 25; // optional OCA group identifier (≤32 chars) for OCO placement (Phase 8b T-O.8)
  optional string     algo_strategy = 26;  // "ADAPTIVE"|"TWAP"|"VWAP"|"ARRIVAL_PRICE"|"ICEBERG"|"RESERVE"|"DARK_ICE"
  map<string, string> algo_params   = 27;  // strategy param key→value (all values are strings)
  reserved 10 to 14, 16 to 20; // forward-extension reservations (R35)
  reserved 28 to 35;  // algo forward-extension
}

message PlaceOrderResponse {
  string broker_order_id = 1; // ib_async permId, populated within ack window
  string status = 2; // initial status from ib_async (PendingSubmit etc.)
  optional string algo_strategy = 3;  // echoed back from request when algo order
  reserved 4 to 25;  // forward growth
}

message ModifyOrderRequest {
  string broker_order_id = 1;
  string account_number = 2;
  Contract contract = 3;
  OrderSide side = 4;
  OrderType order_type = 5;
  TimeInForce tif = 6;
  string qty = 7;
  Money limit_price = 8;
  Money stop_price = 9;
  string client_order_id = 10;
  string cash_amount = 15; // Phase 8c reserved tag 15
  reserved 16 to 20; // forward-extension reservations (R35)
  // Phase 8b reserved tags 21-24 (see docs/superpowers/specs/2026-05-06-phase8b-order-type-expansion-design.md)
  string trail_offset = 21; // Decimal-as-string e.g. "0.50" or "5.0"
  string trail_offset_type = 22; // "AMOUNT" | "PERCENT"
  string trail_limit_offset = 23; // Decimal — TRAIL_LIMIT only
  string expiry_date = 24; // ISO "YYYY-MM-DD" — GTD only
}

message ModifyOrderResponse {
  string broker_order_id = 1;
  string status = 2;
  string parent_broker_order_id = 3;
}

message PlaceBracketRequest {
  PlaceOrderRequest parent = 1;
  PlaceOrderRequest stop_loss = 2;
  PlaceOrderRequest take_profit = 3;
  string oca_group = 4;
  bool has_stop_loss = 5;
  bool has_take_profit = 6;
}

message PlaceBracketResponse {
  string parent_broker_order_id = 1;
  string stop_loss_broker_order_id = 2;
  string take_profit_broker_order_id = 3;
  string status = 4;
}

message CancelOrderRequest {
  string account_number = 1;
  string broker_order_id = 2;
}

message CancelOrderResponse {
  bool accepted = 1;
}

message OrderEventMessage {
  string broker_order_id = 1;
  string client_order_id = 2; // echoed back if known
  string status = 3; // PendingSubmit|Submitted|PreSubmitted|Filled|Cancelled|ApiCancelled|Inactive
  string filled_qty = 4; // decimal-as-string, cumulative
  string avg_fill_price = 5;
  google.protobuf.Timestamp event_at = 6;
  string raw_payload = 7; // jsonb-friendly debug blob (ib_async Trade snapshot)
  string exec_id = 8;
  string kind = 9;
  optional string algo_strategy = 10;  // populated by sidecar when order has algoStrategy
  reserved 11 to 20;
}

message SearchContractsRequest {
  string query = 1; // symbol fragment, e.g. "AAPL", "0700.HK"
  string asset_class = 2; // "STK" | "FUT" | "OPT" | "" (any)
}

message SearchContractsResponse {
  repeated Contract contracts = 1; // existing Contract message reused
}

// Phase 6: per-sidecar credential bootstrap. Validation-only at the sidecar
// side (parses RSA PEM, regex-checks MD5 hex). InitConnect runs in a
// background task; ok=true does NOT mean OpenD reachable. See spec §4.2.
message ConfigureRequest {
  // 32-char lowercase hex MD5 of the trading password (for futu unlock_trade).
  string unlock_pwd_md5 = 1;
  // PEM-encoded RSA private key (1024-bit per Futu requirement; 2048-bit
  // fails InitConnect per memory futu_1024_rsa_key.md). ~1.2KB ASCII PEM,
  // well under gRPC default 4MB; `string` is correct, not `bytes`.
  string rsa_priv_pem = 2;
  string opend_host = 3;
  int32 opend_port = 4;
  string connection_id = 5;
  // Future creds without proto edits.
  map<string, string> metadata = 6;
}

message ConfigureResponse {
  bool ok = 1;
  // Empty on success; "invalid_unlock_pwd_md5" or "invalid_rsa_pem" on
  // validation rejection.
  string detail = 2;
}

// ===== Phase 7b.1 streaming quotes =====

message StreamQuotesRequest {
  oneof op {
    Subscribe subscribe = 1;
    Unsubscribe unsubscribe = 2;
    Heartbeat heartbeat = 3;
    Resync resync = 4;
  }

  message Subscribe {
    repeated SymbolRef symbols = 1;
  }
  message Unsubscribe {
    repeated SymbolRef symbols = 1;
  }
  message Heartbeat {
    google.protobuf.Timestamp client_time = 1;
    int32 tick_count_received = 2;
  }
  // Sidecar reconciles its upstream-broker refcount against `expected`; only
  // diff propagates to broker socket. Used when gRPC reconnects but sidecar
  // process didn't restart (Health.started_at unchanged).
  message Resync {
    repeated SymbolRef expected = 1;
  }
}

message OptionContractHint {
  string conid      = 1;  // broker-native source symbol
  string strike     = 2;  // string decimal e.g. "450.00"
  string expiry_iso = 3;  // "2025-01-17"
  string put_call   = 4;  // "C" | "P"
  int32  multiplier = 5;
}

message SymbolRef {
  string canonical_id = 1;
  string raw_symbol = 2;
  AssetClass asset_class = 3;
  string exchange = 4;
  string currency = 5;
  oneof contract_hint {
    OptionContractHint option_hint = 6;
    // FutureContractHint future_hint = 7;  Phase 14
    // ForexContractHint  forex_hint  = 8;  Phase 15
  }
  reserved 9 to 15;
}

message QuoteMessage {
  string canonical_id = 1;
  google.protobuf.Timestamp tick_time = 2;
  google.protobuf.Timestamp received_at = 3;
  string source = 4;
  // Reserved tags 5-9: future top-level metadata (e.g. sequence_number,
  // partition_key) without disturbing the price block below.
  reserved 5 to 9;

  string last = 10;
  string bid = 11;
  string ask = 12;
  string volume = 13;
  string day_high = 14;
  string day_low = 15;
  string open = 16;
  string prev_close = 17;
  string change_pct = 18;
  string change = 19;
  // Reserved tags 20-29: future price-block extensions (mid, vwap, last_size,
  // bid_size, ask_size, etc.) — kept contiguous with the price band.
  reserved 20 to 29;

  bool is_delayed = 30;
  int32 delay_seconds = 31;
  // Reserved tags 32-89: future staleness/feed-state extensions
  // (e.g. is_trading_halted, halt_reason, feed_status, market_session).
  reserved 32 to 89;

  bytes raw_payload = 90;
  // Reserved tags 91-200: keep open for future debug/trace fields, but tag 90
  // is the canonical "escape hatch" — bump only with a clear reason.
  reserved 91 to 200;
}

// Phase 7a — sidecar→backend single-writer token-refresh callback (architect C2).
// This service is implemented by the BACKEND (not by sidecars). Sidecars are
// gRPC clients of this service when they need a fresh token pair. Backend
// holds the PG advisory lock during the actual refresh; sidecars never call
// Schwab's /oauth/token endpoint directly.
service BackendCallback {
  // broker_id selects which broker's tokens to refresh. Only "schwab"
  // currently uses this path; other brokers reuse their existing auth.
  rpc RequestTokenRefresh(TokenRefreshRequest) returns (TokenRefreshResponse);
}

message TokenRefreshRequest {
  string broker_id = 1; // "schwab" — distinguishes if other brokers ever need this pattern
}

message TokenRefreshResponse {
  string access_token = 1;
  string refresh_token = 2;
  google.protobuf.Timestamp access_issued_at = 3;
}

// ── Phase 12: Options ─────────────────────────────────────────────────────

message OptionChainRequest {
  string underlying_symbol = 1;
  string expiry_date        = 2;  // ISO "2025-01-17"
  string currency           = 3;  // "USD" | "HKD"
  int32  strike_count       = 4;  // max 60 USD, 40 HKD
}

message OptionChainRow {
  string conid         = 1;
  string strike        = 2;  // string decimal (no float precision drift)
  string put_call      = 3;  // "C" | "P"
  string bid           = 4;
  string ask           = 5;
  double iv            = 6;
  double delta         = 7;
  double gamma         = 8;
  double theta         = 9;
  double vega          = 10;
  int64  open_interest = 11;
  int64  volume        = 12;
  int32  multiplier    = 13;
  string exchange      = 14;
  string style         = 15;  // "A"=American | "E"=European
}

message OptionChainResponse {
  repeated OptionChainRow calls         = 1;
  repeated OptionChainRow puts          = 2;
  string                  source        = 3;
  int64                   fetched_at_ms = 4;
}

message OptionExpirationsRequest {
  string underlying_symbol = 1;
  string currency          = 2;
}

message OptionExpirationsResponse {
  repeated string expiry_dates = 1;  // ISO dates sorted ascending
}

message OptionGreeksRequest {
  repeated string conids     = 1;
  string          account_id = 2;
}

message OptionGreeksResponse {
  string conid         = 1;
  double delta         = 2;
  double gamma         = 3;
  double theta         = 4;
  double vega          = 5;
  double rho           = 6;
  double iv            = 7;
  double iv_rank       = 8;
  int64  fetched_at_ms = 9;
}

message ExerciseOptionRequest {
  string account_id      = 1;
  string conid           = 2;
  int64  qty             = 3;
  string action          = 4;  // "EXERCISE" | "DO_NOT_EXERCISE" | "LAPSE"
  string idempotency_key = 5;
}

message ExerciseOptionResponse {
  bool   success    = 1;
  string broker_ref = 2;
  string message    = 3;
}

message ComboLegRequest {
  SymbolRef          symbol          = 1;
  OptionContractHint option_hint     = 2;
  string             side            = 3;
  int32              ratio           = 4;
  string             position_effect = 5;
}

message PlaceComboRequest {
  string                   account_id      = 1;
  string                   strategy_type   = 2;
  repeated ComboLegRequest legs            = 3;
  string                   tif             = 4;
  string                   limit_price     = 5;
  string                   client_combo_id = 6;
}

message ComboLegResult {
  int32  leg_idx         = 1;
  string broker_order_id = 2;
  string status          = 3;
}

message PlaceComboResponse {
  string                  broker_combo_id = 1;
  repeated ComboLegResult legs            = 2;
}

message GetSupportedComboStrategiesRequest {
  string broker_id = 1;
}

message GetSupportedComboStrategiesResponse {
  repeated string strategy_types = 1;
}

message GetFutureContractsRequest {
  string root_symbol = 1;
  string broker_id   = 2;
}

message FutureContractMonth {
  string conid           = 1;
  string contract_month  = 2;  // "202506"
  string expiry_date     = 3;  // "2025-06-20"
  string first_notice    = 4;  // "" if cash-settled; never omit
  string exchange        = 5;
  string tick_size       = 6;  // decimal string
  string tick_value      = 7;  // decimal string
  string multiplier      = 8;  // decimal string
  string settlement_type = 9;  // "CASH" | "PHYSICAL"
}

message GetFutureContractsResponse {
  repeated FutureContractMonth contracts = 1;
}

message StreamSettlementEventsRequest {
  string account_number = 1;
}

message SettlementEvent {
  string conid            = 1;
  string symbol           = 2;
  string settlement_price = 3;  // decimal string
  string cash_delta       = 4;  // signed decimal string
  string settlement_type  = 5;
  string settled_at       = 6;  // ISO8601
  string broker_event_id  = 7;  // IBKR execId / Futu deal_id / Schwab activityId; "" if unavailable
}

message FxQuoteRequest {
  string account_id        = 1;
  string base_currency     = 2;
  string quote_currency    = 3;
  string notional          = 4;  // decimal string
  string notional_currency = 5;  // 'base' or 'quote'
}

message FxQuoteResponse {
  string broker_quote_id = 1;
  string bid             = 2;
  string ask             = 3;
  int32  ttl_seconds     = 4;
  string expires_at      = 5;  // ISO8601 UTC
}

message FxAcceptRequest {
  string account_id      = 1;
  string broker_quote_id = 2;
  string side            = 3;  // 'BUY' or 'SELL'
  string qty             = 4;  // decimal string
}

message FxAcceptResponse {
  string order_id    = 1;
  string fill_price  = 2;
  string status      = 3;
}

message FxCancelRequest {
  string account_id      = 1;
  string broker_quote_id = 2;
}

message FxMidRate {
  string base_currency  = 1;
  string quote_currency = 2;
  string mid            = 3;
  string timestamp      = 4;  // ISO8601 UTC
}

// ── Phase 16a: Bonds ────────────────────────────────────────────────────────

message BondInstrument {
  int64 id = 1;
  string canonical_id = 2;
  string display_name = 3;
  string currency = 4;
  string primary_exchange = 5;
  string isin = 6;
  string cusip = 7;
  string coupon_rate = 8;   // Decimal string
  int32 coupon_frequency = 9;
  string maturity_date = 10; // YYYY-MM-DD
  string face_value = 11;   // Decimal string
  string bond_type = 12;
  string credit_rating = 13;
}

message SearchBondsRequest {
  string query = 1;
  int32 limit = 2;
}

message SearchBondsResponse {
  repeated BondInstrument bonds = 1;
}

message GetBondAccruedInterestRequest {
  int64 instrument_id = 1;
  string account_id = 2;
}

message GetBondAccruedInterestResponse {
  string accrued = 1;   // Decimal string, empty if unknown
  string as_of = 2;     // YYYY-MM-DD
}

// ── Phase 16b: Mutual Funds ─────────────────────────────────────────────────

message FundInstrument {
  int64 id = 1;
  string canonical_id = 2;
  string display_name = 3;
  string currency = 4;
  string fund_family = 5;
  string fund_type = 6;
  string isin = 7;
  string cusip = 8;
  string min_investment = 9;   // Decimal string
  bool allows_fractional = 10;
  string nav_currency = 11;
}

message SearchFundsRequest {
  string query = 1;
  int32 limit = 2;
}

message SearchFundsResponse {
  repeated FundInstrument funds = 1;
}

// ── Phase 16c: CFDs ──────────────────────────────────────────────────────────

message CFDInstrument {
  int64 id = 1;
  string canonical_id = 2;
  string display_name = 3;
  string currency = 4;
  string underlying_type = 5;
  string underlying_symbol = 6;
  string tick_size = 7;    // Decimal string
  string multiplier = 8;   // Decimal string
  string margin_rate = 9;  // Decimal string
  string max_leverage = 10; // Decimal string
  string exchange = 11;
}

message SearchCFDsRequest {
  string query = 1;
  int32 limit = 2;
}

message SearchCFDsResponse {
  repeated CFDInstrument cfds = 1;
}
